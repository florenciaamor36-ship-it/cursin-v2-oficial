<!DOCTYPE html>
<html lang='es' data-theme='dark'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>La Clave Academy | Tienda SSH</title>
    <link href='https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css' rel='stylesheet' type='text/css' />
    <script src='https://cdn.tailwindcss.com'></script>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; }
        .card-img { height: 120px; object-fit: contain; padding: 10px; }
    </style>
</head>
<body>
    <div class='drawer'>
        <input id='my-drawer' type='checkbox' class='drawer-toggle' />
        <div class='drawer-content flex flex-col'>
            <div class='navbar bg-base-300 sticky top-0 z-50'>
                <div class='flex-none'><label for='my-drawer' class='btn btn-square btn-ghost'>☰</label></div>
                <div class='flex-1 font-bold text-xl'>LA CLAVE <span class='text-red-600'>ACADEMY</span></div>
            </div>
            <main class='p-8 container mx-auto'>
                <header class='text-center mb-10'>
                    <h1 class='text-5xl font-black mb-2'>TIENDA <span class='text-red-600'>SSH</span></h1>
                    <p class='text-zinc-500'>By La Clave Argentina | +65.000 Cursos</p>
                </header>
                <div class='max-w-md mx-auto mb-10'>
                    <input type='text' id='q' placeholder='Buscar cursos...' class='input input-bordered w-full rounded-full' oninput='load()' />
                </div>
                <div id='g' class='grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6'></div>
            </main>
            <footer class='footer p-10 bg-base-200 text-base-content border-t border-zinc-800'>
                <nav><header class='footer-title'>La Clave Argentina</header><a class='link link-hover'>Quiénes Somos</a><a class='link link-hover'>Aviso Legal</a></nav>
            </footer>
        </div>
        <div class='drawer-side'>
            <label for='my-drawer' class='drawer-overlay'></label>
            <ul class='menu p-4 w-80 min-h-full bg-base-200'>
                <li class='menu-title'>Categorías SSH</li>
                <li><a onclick='load("programacion")'>Programación</a></li>
                <li><a onclick='load("diseno")'>Diseño</a></li>
            </ul>
        </div>
    </div>
    <script>
        const K = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        async function load(cat = '') {
            const g = document.getElementById('g');
            const q = document.getElementById('q').value;
            let u = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/cursos?select=titulo,plataforma,url,imagen_url&limit=16';
            if(q) u += '&or=(titulo.ilike.*' + q + '*,descripcion.ilike.*' + q + '*)';
            try {
                const r = await fetch(u, { headers: { 'apikey': K, 'Authorization': 'Bearer ' + K } });
                const d = await r.json();
                g.innerHTML = '';
                d.forEach(x => {
                    g.innerHTML += '<div class='card bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden'><img src=' + (x.imagen_url || '') + ' class='card-img' /><div class='card-body p-4'><h3 class='font-bold text-xs'>' + x.titulo + '</h3><a href=' + x.url + ' target=_blank class='btn btn-xs btn-error mt-2'>Ver</a></div></div>';
                });
            } catch(e) {}
        }
        load();
    </script>
</body>
</html>
