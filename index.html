<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Clave Academy - Educación Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --dark: #0a0a0a; --bg: #f4f6f9; --blue: #2563eb; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #1a1a1a; }
        h1, .logo { font-family: 'Montserrat', sans-serif; }
        header { background: var(--dark); color: white; padding: 50px 20px; text-align: center; border-bottom: 4px solid var(--brand); position: relative; }
        .logo { font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin: 0; }
        .logo span { color: var(--brand); }
        .tagline { font-size: 1.1rem; opacity: 0.9; font-weight: 400; margin-top: 5px; color: var(--gold); }
        .stats-top { display: inline-block; background: var(--brand); color: white; padding: 6px 20px; border-radius: 50px; font-weight: 800; font-size: 0.85rem; margin-bottom: 15px; text-transform: uppercase; }
        .search-wrap { max-width: 1000px; margin: -35px auto 40px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); display: flex; flex-wrap: wrap; gap: 15px; position: relative; z-index: 10; border: 1px solid #eee; }
        input, select { flex: 1; min-width: 220px; padding: 16px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--brand); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 60px; }
        .card { background: white; border-radius: 18px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; display: flex; flex-direction: column; position: relative; height: 400px; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px rgba(0,0,0,0.1); border-color: var(--brand); }
        .card-img { height: 180px; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 12px; left: 12px; background: var(--brand); color: white; padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.65rem; z-index: 5; }
        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .plat-name { font-size: 0.75rem; font-weight: 800; color: var(--blue); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        .card h3 { margin: 0; font-size: 1.1rem; line-height: 1.4; color: #0f172a; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 10px; }
        .card p { font-size: 0.85rem; color: #64748b; margin: 0; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .pagi { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 50px 0; }
        .pagi button { padding: 12px 18px; border: 1px solid #cbd5e1; background: white; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .pagi button.active { background: var(--brand); color: white; border-color: var(--brand); }
        footer { background: var(--dark); color: white; padding: 60px 20px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div class="stats-top">⚡ ACCESO TOTAL A <span id="total-count">...</span> CURSOS</div>
        <h1 class="logo">LA CLAVE<span> ACADEMY</span></h1>
        <p class="tagline">La Clave Argentina: Tu Pasaporte al Conocimiento</p>
    </header>
    <div class="container">
        <div class="search-wrap">
            <input type="text" id="q-in" placeholder="¿Qué quieres aprender hoy?">
            <select id="cat-sel"><option value="">Todos los Temas</option></select>
            <select id="plat-sel"><option value="">Todas las Academias</option></select>
        </div>
        <div id="grid" class="grid"></div>
        <div id="loader" style="text-align:center; padding:100px; font-size:1.5rem; color:#94a3b8;">Buscando cursos...</div>
        <div id="pagi" class="pagi"></div>
    </div>
    <footer>
        <div class="footer-logo" style="font-family:'Montserrat'; font-weight:900; font-size:1.5rem;">LA CLAVE<span> ACADEMY</span></div>
        <div class="credits" style="margin-top:20px;">Diseñado por <span>LA CLAVE ARGENTINA</span> & <span>TIENDA SSH</span></div>
    </footer>
    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        let curP = 1; const perP = 32; let totalR = 0;
        const fall = 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800';

        function getImg(c) {
            const yt = c.url.match(/(?:youtube\.com.*v=|youtu\.be\/)([^"&?\/\s]{11})/);
            if (yt) return `https://i.ytimg.com/vi/${yt[1]}/mqdefault.jpg`;
            if (c.imagen_url && c.imagen_url.startsWith('http')) return c.imagen_url;
            return fall;
        }

        async function load() {
            const grid = document.getElementById('grid');
            const q = document.getElementById('q-in').value.trim();
            const ct = document.getElementById('cat-sel').value;
            const pl = document.getElementById('plat-sel').value;
            grid.innerHTML = ''; document.getElementById('loader').style.display = 'block';
            
            let u = `${S_URL}cursos?select=*,categorias(nombre)&limit=${perP}&offset=${(curP-1)*perP}`;
            if(q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if(ct) u += `&categorias.nombre=eq.${encodeURIComponent(ct)}`;
            if(pl) u += `&plataforma=eq.${encodeURIComponent(pl)}`;
            u += `&order=creado_el.desc`;

            try {
                const r = await fetch(u, { headers });
                const data = await r.json();
                document.getElementById('loader').style.display = 'none';
                data.forEach(c => {
                    const d = document.createElement('div'); d.className = 'card';
                    d.onclick = () => window.open(c.url, '_blank');
                    d.innerHTML = `<div class="card-img"><div class="badge">GRATIS</div><img src="${getImg(c)}" onerror="this.src='${fall}'"></div>
                                   <div class="card-body"><div class="plat-name">${c.plataforma}</div><h3>${c.titulo}</h3><p>${c.descripcion || ''}</p></div>`;
                    grid.appendChild(d);
                });
                count(q, ct, pl);
            } catch(e) { console.error(e); }
        }

        async function count(q, ct, pl) {
            let u = `${S_URL}cursos?select=count`;
            if(q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if(ct) u += `&categorias.nombre=eq.${encodeURIComponent(ct)}`;
            if(pl) u += `&plataforma=eq.${encodeURIComponent(pl)}`;
            const r = await fetch(u, { headers });
            const d = await r.json(); totalR = d[0].count;
            document.getElementById('total-count').innerText = totalR.toLocaleString();
            pagi();
        }

        function pagi() {
            const w = document.getElementById('pagi'); w.innerHTML = '';
            const tP = Math.ceil(totalR / perP); if (tP <= 1) return;
            for (let i = Math.max(1, curP - 2); i <= Math.min(tP, curP + 2); i++) {
                const b = document.createElement('button'); b.innerText = i;
                if (i === curP) b.className = 'active';
                b.onclick = () => { curP = i; load(); window.scrollTo(0,0); };
                w.appendChild(b);
            }
        }

        async function init() {
            const [rc, rp] = await Promise.all([
                fetch(S_URL + 'categorias?select=nombre', { headers }).then(r => r.json()),
                fetch(S_URL + 'cursos?select=plataforma', { headers }).then(r => r.json())
            ]);
            rc.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c => {
                const o = document.createElement('option'); o.value = o.innerText = c.nombre; document.getElementById('cat-sel').appendChild(o);
            });
            [...new Set(rp.map(p => p.plataforma))].sort().forEach(p => {
                if(p) { const o = document.createElement('option'); o.value = o.innerText = p; document.getElementById('plat-sel').appendChild(o); }
            });
            load();
        }

        document.getElementById('q-in').oninput = () => { curP = 1; clearTimeout(window.t); window.t = setTimeout(load, 600); };
        document.getElementById('cat-sel').onchange = () => { curP = 1; load(); };
        document.getElementById('plat-sel').onchange = () => { curP = 1; load(); };
        init();
    </script>
</body>
</html>
