<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Clave Academy | Buscador de Cursos Oficiales Gratuitos</title>
    <meta name="description" content="Encuentra miles de cursos gratuitos con certificación oficial de Google, Microsoft e IBM. Formación de élite verificada.">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --bg: #050505; --surface: #0f0f0f; --border: rgba(255,255,255,0.08); --text: #fff; --text-dim: #999; --accent-blue: #0070f3; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        header { padding: 80px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .h-title { font-family: 'Montserrat'; font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900; letter-spacing: -2px; }
        .h-title span { color: var(--brand); }
        .h-desc { max-width: 750px; margin: 20px auto 40px; font-size: 1.2rem; color: var(--text-dim); font-weight: 300; }
        .metrics { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
        .m-card { background: var(--surface); padding: 15px 25px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .m-val { color: var(--gold); font-weight: 900; font-size: 1.2rem; display: block; }
        .m-lbl { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
        .cats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 60px; }
        .cat-btn { background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); color: #fff; cursor: pointer; font-weight: 700; font-size: 0.8rem; text-align: center; transition: 0.3s; }
        .cat-btn:hover { border-color: var(--brand); background: rgba(255,0,0,0.1); }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        .search-area { position: relative; margin: -40px auto 60px; max-width: 900px; z-index: 1000; }
        .search-box { background: #fff; border-radius: 50px; padding: 10px 30px; display: flex; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .search-box input { flex: 1; border: none; padding: 15px; font-size: 1.1rem; font-weight: 600; outline: none; color: #000; }
        #sug-box { position: absolute; top: 100%; left: 20px; right: 20px; background: #fff; border-radius: 0 0 20px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; overflow: hidden; border-top: 1px solid #eee; }
        .sug-item { padding: 12px 25px; color: #333; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .sug-item:hover { background: #f5f5f5; color: var(--brand); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 80px; }
        .card { background: var(--surface); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; height: 520px; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--brand); }
        .c-img { height: 200px; background: #000; position: relative; }
        .c-img img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .c-logo { position: absolute; bottom: -20px; right: 20px; width: 50px; height: 50px; background: #fff; border-radius: 12px; padding: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .c-logo img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .c-body { padding: 35px 20px 20px; flex: 1; display: flex; flex-direction: column; }
        .c-body h3 { font-family: 'Montserrat'; font-size: 1.2rem; margin-bottom: 10px; height: 2.6em; overflow: hidden; }
        .c-meta { font-size: 0.75rem; color: var(--gold); font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }
        .c-desc { font-size: 0.85rem; color: #888; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .pagi { display: flex; justify-content: center; gap: 10px; margin-bottom: 100px; }
        .p-btn { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: #fff; font-weight: 700; cursor: pointer; }
        .p-btn.active { background: var(--brand); border-color: var(--brand); }
        footer { padding: 80px 20px; text-align: center; border-top: 1px solid var(--border); }
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loader"><p style="color:var(--gold); font-weight:900; font-family:Montserrat;">LA CLAVE ACADEMY</p></div>
    <header>
        <h1 class="h-title">LA CLAVE<br><span>ACADEMY</span></h1>
        <p class="h-desc">Encuentra cursos gratuitos con certificación oficial de las mejores instituciones.</p>
        <div class="metrics">
            <div class="m-card"><span class="m-val" id="count-val">...</span><span class="m-lbl">Cursos Verificados</span></div>
            <div class="m-card"><span class="m-val">400+</span><span class="m-lbl">Academias</span></div>
            <div class="m-card"><span class="m-val">100%</span><span class="m-lbl">Gratis</span></div>
        </div>
    </header>
    <div class="container">
        <div class="search-area"><div class="search-box"><input type="text" id="q" placeholder="¿Qué quieres aprender?" autocomplete="off"></div><div id="sug-box"></div></div>
        <h2 style="margin-bottom:20px; font-family:Montserrat">Categorías Destacadas</h2>
        <div class="cats" id="cat-grid"></div>
        <div id="grid" class="grid"></div>
        <div id="pagi" class="pagi"></div>
    </div>
    <footer><p style="font-family:Montserrat; font-weight:900">LA CLAVE <span>ACADEMY</span></p><p style="color:#444; font-size:0.7rem; margin-top:20px;">© 2026 LA CLAVE ARGENTINA. Ley 11.723.</p></footer>
    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        let page = 1; const limit = 16; let total = 0;
        const LOGOS = { 'google': 'https://www.gstatic.com/images/branding/product/2x/googleg_96dp.png', 'microsoft': 'https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg', 'ibm': 'https://upload.wikimedia.org/wikipedia/commons/5/51/IBM_logo.svg', 'unam': 'https://upload.wikimedia.org/wikipedia/commons/c/ca/Escudo-UNAM-escalable.svg' };
        const TOP_CATS = ['Inteligencia Artificial', 'Programación', 'Marketing', 'Diseño', 'Negocios', 'Idiomas'];
        function getImg(c) {
            const yt = c.url.match(/(?:youtube\.com.*v=|youtu\.be\/)([^"&?\/\s]{11})/);
            return yt ? `https://i.ytimg.com/vi/${yt[1]}/hqdefault.jpg` : (c.imagen_url || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&q=80');
        }
        async function load(query = '') {
            const g = document.getElementById('grid'); document.getElementById('loader').style.display = 'flex';
            let u = `${S_URL}cursos?select=*,categorias!inner(nombre)&limit=${limit}&offset=${(page-1)*limit}`;
            if (query) u += `&or=(titulo.ilike.*${encodeURIComponent(query)}*,descripcion.ilike.*${encodeURIComponent(query)}*)`;
            u += '&order=creado_el.desc';
            try {
                const res = await fetch(u, { headers: { ...headers, 'Prefer': 'count=exact' } });
                const cHead = res.headers.get('content-range');
                if (cHead) { total = parseInt(cHead.split('/')[1]); document.getElementById('count-val').innerText = total.toLocaleString(); }
                const data = await res.json(); g.innerHTML = ''; document.getElementById('loader').style.display = 'none';
                data.forEach(c => {
                    const card = document.createElement('a'); card.className = 'card'; card.href = c.url; card.target = '_blank';
                    let l = 'https://cdn-icons-png.flaticon.com/512/3429/3429141.png';
                    for(let k in LOGOS) { if(c.plataforma.toLowerCase().includes(k)) l = LOGOS[k]; }
                    card.innerHTML = `<div class="c-img"><div class="c-logo"><img src="${l}"></div><img src="${getImg(c)}" loading="lazy"></div>
                        <div class="c-body"><span class="c-meta">Certificación Oficial</span><h3>${c.titulo}</h3><p class="c-desc">${c.descripcion || ''}</p><small style="color:var(--accent-blue);font-weight:800;margin-top:auto;">${c.plataforma}</small></div>`;
                    g.appendChild(card);
                });
                renderPagi();
            } catch (e) { document.getElementById('loader').style.display = 'none'; }
        }
        function renderPagi() {
            const w = document.getElementById('pagi'); w.innerHTML = ''; const tP = Math.ceil(total / limit);
            for (let i = Math.max(1, page-1); i <= Math.min(tP, page+1); i++) {
                const b = document.createElement('button'); b.className = `p-btn ${i === page ? 'active' : ''}`; b.innerText = i;
                b.onclick = () => { page = i; load(document.getElementById('q').value); window.scrollTo({top: 500, behavior: 'smooth'}); }; w.appendChild(b);
            }
        }
        document.getElementById('q').oninput = async (e) => {
            const val = e.target.value; const box = document.getElementById('sug-box');
            if (val.length < 2) { box.style.display = 'none'; return; }
            const res = await fetch(`${S_URL}cursos?select=titulo&titulo=ilike.*${val}*&limit=5`, {headers});
            const data = await res.json();
            if (data.length > 0) {
                box.innerHTML = ''; box.style.display = 'block';
                data.forEach(item => {
                    const d = document.createElement('div'); d.className = 'sug-item'; d.innerText = item.titulo;
                    d.onclick = () => { document.getElementById('q').value = item.titulo; box.style.display = 'none'; load(item.titulo); }; box.appendChild(d);
                });
            } else { box.style.display = 'none'; }
            clearTimeout(window.t); window.t = setTimeout(() => load(val), 800);
        };
        const catGrid = document.getElementById('cat-grid');
        TOP_CATS.forEach(c => {
            const b = document.createElement('div'); b.className = 'cat-btn'; b.innerText = c;
            b.onclick = () => { document.getElementById('q').value = c; load(c); }; catGrid.appendChild(b);
        });
        load();
    </script>
</body>
</html>
