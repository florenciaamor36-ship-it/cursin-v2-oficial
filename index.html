<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursin V2 - La Mina de Oro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --dark: #0f172a; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--dark); }
        h1, .logo { font-family: 'Montserrat', sans-serif; }

        /* HEADER IDENTIDAD */
        header { background: #000; color: white; padding: 40px 20px; text-align: center; border-bottom: 4px solid var(--brand); position: relative; overflow: hidden; }
        header::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); opacity: 0.3; }
        .logo { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; margin: 0; position: relative; }
        .logo span { color: var(--brand); }
        .tagline { font-size: 1.2rem; opacity: 0.8; font-weight: 400; margin-top: 5px; position: relative; }
        .stats-top { display: inline-block; background: var(--brand); color: white; padding: 5px 15px; border-radius: 50px; font-weight: 800; font-size: 0.8rem; margin-bottom: 20px; position: relative; }

        /* BUSCADOR */
        .search-wrap { max-width: 1000px; margin: -35px auto 40px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; gap: 15px; position: relative; z-index: 10; }
        input, select { flex: 1; min-width: 200px; padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--brand); }

        /* GRID */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px 80px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* TARJETA PREMIUM */
        .card { background: white; border-radius: 18px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; display: flex; flex-direction: column; position: relative; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px rgba(0,0,0,0.1); border-color: var(--brand); }
        
        .card-img { height: 160px; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-img img.is-logo { object-fit: contain; width: 60%; height: 60%; }
        
        .badge { position: absolute; top: 12px; left: 12px; background: var(--brand); color: white; padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.65rem; z-index: 5; }
        
        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .plat-name { font-size: 0.7rem; font-weight: 800; color: var(--brand); text-transform: uppercase; margin-bottom: 8px; }
        .card h3 { margin: 0 0 10px 0; font-size: 1.1rem; line-height: 1.4; color: #1e293b; height: 2.8em; overflow: hidden; }
        .card p { font-size: 0.85rem; color: #64748b; line-height: 1.5; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* PAGINACIÓN */
        .pagi { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 50px; }
        .pagi button { padding: 12px 18px; border: 1px solid #e2e8f0; background: white; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .pagi button:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
        .pagi button.active { background: var(--brand); color: white; border-color: var(--brand); }
        .pagi .arrow { font-size: 1.4rem; line-height: 1; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .m-card { background: white; width: 100%; max-width: 700px; border-radius: 25px; overflow: hidden; position: relative; animation: pop 0.3s ease; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .m-close { position: absolute; top: 15px; right: 20px; font-size: 2.5rem; color: white; cursor: pointer; z-index: 100; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .m-hero { height: 300px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; background-color: #000; }
        .m-hero img { width: 100%; height: 100%; object-fit: cover; }
        .m-hero img.is-logo { object-fit: contain; width: 50%; height: 50%; }
        .m-body { padding: 35px; }
        .btn-go { display: block; width: 100%; background: var(--brand); color: white; text-align: center; padding: 20px; border-radius: 15px; text-decoration: none; font-weight: 900; font-size: 1.2rem; box-shadow: 0 10px 20px rgba(255,0,0,0.2); }
    </style>
</head>
<body>
    <header>
        <div class="stats-top">⚡ <span id="total-count">65,650</span> CURSOS LIBERADOS</div>
        <h1 class="logo">CURSIN<span>.V2</span></h1>
        <p class="tagline">La mayor mina de oro de educación con certificación gratuita</p>
    </header>

    <div class="container">
        <div class="search-wrap">
            <input type="text" id="q-in" placeholder="¿Qué quieres aprender? (Ej: Python, Excel, UNAM...)">
            <select id="cat-sel"><option value="">Todas las Categorías</option></select>
            <select id="plat-sel"><option value="">Todas las Plataformas</option></select>
        </div>

        <div id="grid" class="grid"></div>
        <div id="loader" style="text-align:center; padding:100px; font-size:1.5rem; color:#94a3b8;">⛏️ Extrayendo data...</div>
        
        <div id="pagi" class="pagi"></div>
    </div>

    <div id="modal" class="modal" onclick="if(event.target==this)closeM()">
        <span class="m-close" onclick="closeM()">&times;</span>
        <div class="m-card">
            <div id="m-img" class="m-hero"></div>
            <div class="m-body">
                <div id="m-plat" class="plat-name"></div>
                <h2 id="m-title" style="margin:0 0 15px 0;"></h2>
                <p id="m-desc" style="color:#4b5563; line-height:1.7; margin-bottom:25px;"></p>
                <a id="m-link" href="#" target="_blank" class="btn-go">ACCEDER AL CURSO Y CERTIFICARME</a>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        
        let page = 1;
        const perPage = 32;
        let total = 0;

        const ytLogos = [
            'https://raw.githubusercontent.com/Marck-S/Youtube-Logo-High-Res/master/youtube-logo.png',
            'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/YouTube_Logo_2017.svg/1024px-YouTube_Logo_2017.svg.png'
        ];

        const fallbacks = [
            'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800',
            'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800',
            'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=800',
            'https://images.unsplash.com/photo-1558655146-d09347e92766?w=800',
            'https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800'
        ];

        function getImg(c, i) {
            const ytMatch = c.url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
            if (ytMatch) return { src: `https://i.ytimg.com/vi/${ytMatch[1]}/mqdefault.jpg`, isLogo: false };
            
            if (c.imagen_url && c.imagen_url.includes('http') && !c.imagen_url.toLowerCase().includes('logo')) {
                return { src: c.imagen_url, isLogo: false };
            }
            
            if (c.plataforma.toLowerCase().includes('youtube')) return { src: ytLogos[0], isLogo: true };
            
            return { src: fallbacks[i % fallbacks.length], isLogo: false };
        }

        function openM(c, i) {
            const img = getImg(c, i);
            document.getElementById('m-img').innerHTML = `<img src="${img.src}" class="${img.isLogo?'is-logo':''}">`;
            document.getElementById('m-title').innerText = c.titulo;
            document.getElementById('m-desc').innerText = c.descripcion || "Este curso oficial ofrece formación gratuita con certificado. Accede ahora para comenzar.";
            document.getElementById('m-plat').innerText = c.plataforma;
            document.getElementById('m-link').href = c.url;
            document.getElementById('modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        function closeM() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        async function fetchContent() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('q-in').value;
            const cat = document.getElementById('cat-sel').value;
            const plat = document.getElementById('plat-sel').value;

            document.getElementById('loader').style.display = 'block';
            grid.innerHTML = '';

            let u = `${S_URL}cursos?select=*,categorias(nombre)&limit=${perPage}&offset=${(page - 1) * perPage}`;
            if (search) u += `&or=(titulo.ilike.*${encodeURIComponent(search)}*,descripcion.ilike.*${encodeURIComponent(search)}*)`;
            if (cat) u += `&categorias.nombre=eq.${encodeURIComponent(cat)}`;
            if (plat) u += `&plataforma.eq.${encodeURIComponent(plat)}`;
            u += '&order=creado_el.desc';

            try {
                const [r, cr] = await Promise.all([
                    fetch(u, { headers }).then(r => r.json()),
                    fetch(`${S_URL}cursos?select=count`, { headers }).then(r => r.json())
                ]);
                
                total = cr[0].count;
                document.getElementById('total-count').innerText = total.toLocaleString();
                document.getElementById('loader').style.display = 'none';
                
                r.forEach((c, i) => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.onclick = () => openM(c, i);
                    const img = getImg(c, i);
                    div.innerHTML = `
                        <div class="card-img">
                            <div class="badge">OFICIAL</div>
                            <img src="${img.src}" class="${img.isLogo?'is-logo':''}" onerror="this.src='${fallbacks[0]}'">
                        </div>
                        <div class="card-body">
                            <div class="plat-name">${c.plataforma}</div>
                            <h3>${c.titulo}</h3>
                            <p>${c.descripcion || ''}</p>
                        </div>`;
                    grid.appendChild(div);
                });
                renderPagi();
            } catch(e) { console.error(e); }
        }

        function renderPagi() {
            const wrap = document.getElementById('pagi');
            wrap.innerHTML = '';
            const totalPages = Math.ceil(total / perPage);
            
            const prev = document.createElement('button');
            prev.innerHTML = '<span class="arrow">‹</span>';
            prev.disabled = page === 1;
            prev.onclick = () => { page--; fetchContent(); window.scrollTo(0,0); };
            wrap.appendChild(prev);

            let start = Math.max(1, page - 2);
            let end = Math.min(totalPages, start + 4);
            for (let i = start; i <= end; i++) {
                const b = document.createElement('button');
                b.innerText = i;
                if (i === page) b.className = 'active';
                b.onclick = () => { page = i; fetchContent(); window.scrollTo(0,0); };
                wrap.appendChild(b);
            }

            const next = document.createElement('button');
            next.innerHTML = '<span class="arrow">›</span>';
            next.disabled = page === totalPages;
            next.onclick = () => { page++; fetchContent(); window.scrollTo(0,0); };
            wrap.appendChild(next);
        }

        async function init() {
            const [rc, rp] = await Promise.all([
                fetch(S_URL + 'categorias', { headers }).then(r => r.json()),
                fetch(S_URL + 'cursos?select=plataforma', { headers }).then(r => r.json())
            ]);
            const cs = document.getElementById('cat-sel');
            rc.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c => {
                const o = document.createElement('option'); o.value = c.nombre; o.innerText = c.nombre; cs.appendChild(o);
            });
            const ps = document.getElementById('plat-sel');
            [...new Set(rp.map(p => p.plataforma))].sort().forEach(p => {
                const o = document.createElement('option'); o.value = p; o.innerText = p; ps.appendChild(o);
            });
            fetchContent();
        }

        document.getElementById('q-in').oninput = () => { page=1; clearTimeout(window.t); window.t = setTimeout(fetchContent, 600); };
        document.getElementById('cat-sel').onchange = () => { page=1; fetchContent(); };
        document.getElementById('plat-sel').onchange = () => { page=1; fetchContent(); };
        init();
    </script>
</body>
</html>
