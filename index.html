<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Clave Academy | Cursos Gratuitos Certificados</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff0000">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --bg: #050505; --surface: #0f0f0f; --border: rgba(255,255,255,0.08); --text: #fff; --text-dim: #999; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 2000; backdrop-filter: blur(15px); }
        .nav-logo { font-family: 'Montserrat'; font-weight: 900; font-size: 1.3rem; }
        .nav-logo span { color: var(--brand); }
        header { padding: 60px 20px; text-align: center; }
        .h-title { font-family: 'Montserrat'; font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 900; line-height: 1; }
        .h-title span { color: var(--brand); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .search-area { margin: 20px auto 40px; max-width: 800px; position: relative; z-index: 1000; }
        .search-box { background: #fff; border-radius: 100px; padding: 5px 20px; display: flex; align-items: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .search-box input { flex: 1; border: none; padding: 15px; font-size: 1rem; font-weight: 600; outline: none; color: #000; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 60px; }
        .card { background: var(--surface); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; height: 500px; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { border-color: var(--brand); transform: translateY(-5px); }
        .c-img { height: 180px; background: #000; position: relative; }
        .c-img img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .c-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .c-body h3 { font-family: 'Montserrat'; font-size: 1.1rem; margin-bottom: 10px; line-height: 1.3; }
        .c-plat { font-size: 0.7rem; font-weight: 900; color: var(--brand); text-transform: uppercase; margin-top: auto; }
        .c-desc { font-size: 0.85rem; color: #888; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-top: 10px; }
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; transition: opacity 0.5s; }
        .spin { width: 40px; height: 40px; border: 3px solid #222; border-top-color: var(--brand); border-radius: 50%; animation: r 0.8s linear infinite; }
        @keyframes r { to { transform: rotate(360deg); } }
        
        /* Modal simple */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
        .m-content { background: var(--surface); max-width: 600px; width: 100%; border-radius: 20px; border: 1px solid var(--border); padding: 30px; position: relative; }
        .m-close { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <div id="loader"><div class="spin"></div><p style="font-family:Montserrat; font-weight:900; color:var(--brand);">CARGANDO...</p></div>
    
    <nav><div class="nav-logo">LA CLAVE<span> ACADEMY</span></div></nav>
    
    <header><h1 class="h-title">CURSOS DE<br><span>ÉLITE</span></h1></header>
    
    <div class="container">
        <div class="search-area"><div class="search-box"><input type="text" id="q" placeholder="¿Qué quieres aprender?"></div></div>
        <div id="grid" class="grid"></div>
    </div>

    <div id="modal"><div class="m-content" id="m-inner"></div></div>

    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };

        async function load() {
            const q = document.getElementById('q').value;
            const g = document.getElementById('grid');
            let u = `${S_URL}cursos?select=*&limit=20&order=creado_el.desc`;
            if(q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            
            try {
                const res = await fetch(u, {headers});
                const data = await res.json();
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                
                g.innerHTML = '';
                data.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openC(c);
                    card.innerHTML = `<div class="c-img"><img src="${c.imagen_url || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800'}" loading="lazy"></div>
                        <div class="c-body"><h3>${c.titulo}</h3><p class="c-desc">${c.descripcion || ''}</p><div class="c-plat">${c.plataforma}</div></div>`;
                    g.appendChild(card);
                });
            } catch (e) {
                document.getElementById('loader').innerHTML = '<p style="color:white;">Error de conexión. Reintenta.</p>';
            }
        }

        function openC(c) {
            const m = document.getElementById('modal');
            document.getElementById('m-inner').innerHTML = `<span class="m-close" onclick="document.getElementById('modal').style.display='none'">×</span>
                <h2 style="margin-bottom:15px; font-family:Montserrat;">${c.titulo}</h2>
                <p style="color:#aaa; margin-bottom:25px; line-height:1.6;">${c.descripcion || ''}</p>
                <a href="${c.url}" target="_blank" style="display:block; text-align:center; background:var(--brand); color:#fff; text-decoration:none; padding:15px; border-radius:50px; font-weight:900;">VER CURSO</a>`;
            m.style.display = 'flex';
        }

        // Clean SW for v59
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(rs => { for(let r of rs) r.unregister(); });
        }

        document.getElementById('q').oninput = () => { clearTimeout(window.t); window.t = setTimeout(load, 500); };
        load();
    </script>
</body>
</html>
