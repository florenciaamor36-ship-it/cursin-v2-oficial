<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Clave Academy | Buscador de Cursos de Élite con Certificación</title>
    <meta name="description" content="Encuentra cursos gratuitos de Google, IBM y Microsoft. Automatización de búsqueda educativa con certificación oficial verificada.">
    <script type="application/ld+json"> { "@context": "https://schema.org", "@type": "ItemList", "itemListElement": [] } </script>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --bg: #050505; --surface: #0f0f0f; --border: rgba(255,255,255,0.08); --text: #fff; --text-dim: #999; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 2000; backdrop-filter: blur(15px); }
        .nav-logo { font-family: 'Montserrat'; font-weight: 900; font-size: 1.3rem; }
        .nav-logo span { color: var(--brand); }
        .discovery-status { font-size: 0.65rem; color: #00ff00; font-weight: 800; display: flex; align-items: center; gap: 5px; background: rgba(0,255,0,0.05); padding: 5px 10px; border-radius: 50px; }
        .dot { width: 6px; height: 6px; background: #00ff00; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        header { padding: 80px 20px; text-align: center; }
        .h-title { font-family: 'Montserrat'; font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900; line-height: 0.9; }
        .h-title span { color: var(--brand); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 25px; }
        .search-area { margin: -50px auto 60px; max-width: 900px; position: relative; z-index: 1000; }
        .search-box { background: #fff; border-radius: 100px; padding: 5px 25px; display: flex; align-items: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .search-box input { flex: 1; border: none; padding: 18px; font-size: 1.1rem; font-weight: 600; outline: none; color: #000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-bottom: 100px; }
        .card { background: var(--surface); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; height: 560px; text-decoration: none; color: inherit; display: flex; flex-direction: column; position: relative; transition: 0.4s; cursor: pointer; }
        .card:hover { border-color: var(--brand); transform: translateY(-10px); }
        .c-img { height: 220px; background: #000; position: relative; }
        .c-img img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .badge-new { position: absolute; top: 15px; left: 15px; background: var(--brand); color: #fff; font-weight: 900; font-size: 0.65rem; padding: 5px 12px; border-radius: 100px; z-index: 10; }
        .c-body { padding: 30px 20px 20px; flex: 1; display: flex; flex-direction: column; }
        .c-body h3 { font-family: 'Montserrat'; font-size: 1.2rem; font-weight: 800; margin-bottom: 10px; line-height: 1.3; }
        .c-meta { font-size: 0.7rem; color: var(--gold); font-weight: 800; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .c-desc { font-size: 0.85rem; color: #888; line-height: 1.6; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; margin-bottom: 20px; }
        .c-footer { margin-top: auto; border-top: 1px solid var(--border); padding-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .c-plat { font-size: 0.75rem; font-weight: 900; color: var(--brand); }
        #page-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: none; overflow-y: auto; padding: 0; }
        .p-header { height: 400px; position: relative; background: #000; }
        .p-header img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .p-content { max-width: 900px; margin: -100px auto 100px; position: relative; background: var(--surface); border-radius: 40px; padding: 60px; border: 1px solid var(--border); }
        .p-back { position: fixed; top: 30px; left: 30px; background: #fff; color: #000; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; z-index: 10000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loader"><p style="color:var(--brand); font-weight:900; font-family:Montserrat;">SINCRONIZANDO...</p></div>
    <nav>
        <div class="nav-logo">LA CLAVE<span> ACADEMY</span></div>
        <div class="discovery-status"><div class="dot"></div> EXPLORANDO NUEVAS FUENTES (GOOGLE, IBM, MS)</div>
    </nav>
    <header><h1 class="h-title">EL FUTURO DE LA<br><span>FORMACIÓN DE ÉLITE</span></h1></header>
    <div class="container">
        <div class="search-area"><div class="search-box"><input type="text" id="q" placeholder="Buscar entre miles de cursos verificados..." autocomplete="off"></div></div>
        <div id="grid" class="grid"></div>
    </div>
    <div id="page-overlay"><div class="p-back" onclick="closePage()">←</div><div id="p-inner"></div></div>
    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        async function load() {
            const g = document.getElementById('grid'); const q = document.getElementById('q').value;
            let u = `${S_URL}cursos?select=*&limit=15&order=creado_el.desc`;
            if(q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            const res = await fetch(u, {headers}); const data = await res.json();
            document.getElementById('loader').style.display = 'none'; g.innerHTML = '';
            data.forEach(c => {
                const isNew = (new Date() - new Date(c.creado_el)) < (72 * 60 * 60 * 1000);
                const card = document.createElement('div'); card.className = 'card'; card.onclick = () => openPage(c);
                card.innerHTML = `${isNew ? '<span class="badge-new">DESCUBRIMIENTO SEMANAL</span>' : ''}<div class="c-img"><img src="${c.imagen_url || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800'}" loading="lazy"></div>
                    <div class="c-body"><div class="c-meta">Certificación Oficial Verificada</div><h3>${c.titulo}</h3><p class="c-desc">${c.descripcion || ''}</p><div class="c-footer"><span class="c-plat">${c.plataforma}</span></div></div>`;
                g.appendChild(card);
            });
            const urlParams = new URLSearchParams(window.location.search); const courseSlug = urlParams.get('curso');
            if (courseSlug && !window.modalOpen) { const target = data.find(c => c.titulo.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '') === courseSlug); if (target) openPage(target); }
        }
        function openPage(c) {
            window.modalOpen = true; const overlay = document.getElementById('page-overlay'); const inner = document.getElementById('p-inner');
            overlay.style.display = 'block'; document.body.style.overflow = 'hidden';
            inner.innerHTML = `<div class="p-header"><img src="${c.imagen_url}"></div><div class="p-content"><div style="font-weight:900; color:var(--brand); margin-bottom:10px; font-size:0.8rem; letter-spacing:2px; text-transform:uppercase">${c.plataforma}</div><h1 style="font-family:Montserrat; font-size:2.5rem; line-height:1.1; margin-bottom:30px">${c.titulo}</h1><div style="display:flex; gap:20px; margin-bottom:30px; color:var(--gold); font-weight:800; font-size:0.8rem"><span>✅ Certificado</span><span>💎 Acceso Ilimitado</span></div><p style="font-size:1.1rem; line-height:1.7; color:#aaa; margin-bottom:40px">${c.descripcion || ''}</p><a href="${c.url}" target="_blank" style="display:block; text-align:center; background:var(--brand); color:#fff; text-decoration:none; padding:20px; border-radius:100px; font-weight:900; font-size:1.1rem; box-shadow: 0 15px 30px rgba(255,0,0,0.3)">INSCRIBIRME</a></div>`;
            const slug = c.titulo.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, ''); window.history.pushState({courseId: c.id}, '', `?curso=${slug}`); document.title = `${c.titulo} | La Clave Academy`;
        }
        function closePage() { document.getElementById('page-overlay').style.display = 'none'; document.body.style.overflow = 'auto'; window.history.pushState({}, '', window.location.pathname); document.title = "La Clave Academy | Buscador de Cursos de Élite"; window.modalOpen = false; }
        document.getElementById('q').oninput = () => { clearTimeout(window.t); window.t = setTimeout(load, 500); };
        load();
    </script>
</body>
</html>
