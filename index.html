<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Clave Academy - Educación Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --dark: #0a0a0a; --bg: #f4f6f9; --blue: #2563eb; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #1a1a1a; }
        h1, .logo { font-family: 'Montserrat', sans-serif; }
        header { background: var(--dark); color: white; padding: 50px 20px; text-align: center; border-bottom: 4px solid var(--brand); position: relative; }
        .logo { font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin: 0; }
        .logo span { color: var(--brand); }
        .tagline { font-size: 1.1rem; opacity: 0.9; font-weight: 400; margin-top: 5px; color: var(--gold); }
        .stats-top { display: inline-block; background: var(--brand); color: white; padding: 6px 20px; border-radius: 50px; font-weight: 800; font-size: 0.85rem; margin-bottom: 15px; text-transform: uppercase; }
        .search-wrap { max-width: 1000px; margin: -35px auto 40px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); display: flex; flex-wrap: wrap; gap: 15px; position: relative; z-index: 10; border: 1px solid #eee; }
        input, select { flex: 1; min-width: 220px; padding: 16px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--brand); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 60px; }
        .card { background: white; border-radius: 18px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; display: flex; flex-direction: column; position: relative; height: 420px; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px rgba(0,0,0,0.1); border-color: var(--brand); }
        .card-img { height: 200px; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .badge { position: absolute; top: 12px; left: 12px; background: var(--brand); color: white; padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.65rem; z-index: 5; }
        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .plat-name { font-size: 0.75rem; font-weight: 800; color: var(--blue); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        .card h3 { margin: 0 0 10px 0; font-size: 1.1rem; line-height: 1.4; color: #0f172a; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card p { font-size: 0.85rem; color: #64748b; line-height: 1.5; margin: 0; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .pagi { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 50px 0; padding-bottom: 50px; }
        .pagi button { padding: 12px 18px; border: 1px solid #cbd5e1; background: white; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; min-width: 45px; }
        .pagi button.active { background: var(--brand); color: white; border-color: var(--brand); }
        footer { background: var(--dark); color: white; padding: 60px 20px; text-align: center; }
        .credits span { color: var(--brand); }
    </style>
</head>
<body>
    <header>
        <div class="stats-top">⚡ <span id="total-count">...</span> CURSOS PARA VOS</div>
        <h1 class="logo">LA CLAVE<span> ACADEMY</span></h1>
        <p class="tagline">La Clave Argentina: Tu Pasaporte al Conocimiento</p>
    </header>
    <div class="container">
        <div class="search-wrap">
            <input type="text" id="q-in" placeholder="¿Qué buscamos hoy? (Ej: Excel, Python, Marketing)">
            <select id="cat-sel"><option value="">Todos los Temas</option></select>
            <select id="plat-sel"><option value="">Todas las Academias</option></select>
        </div>
        <div id="grid" class="grid"></div>
        <div id="loader" style="text-align:center; padding:100px; font-size:1.5rem; color:#94a3b8;">⛏️ Buscando en La Clave...</div>
        <div id="pagi" class="pagi"></div>
    </div>
    <footer>
        <div class="footer-logo" style="font-family:'Montserrat'; font-weight:900; font-size:1.5rem; margin-bottom:10px;">LA CLAVE<span> ACADEMY</span></div>
        <div class="credits">Diseñado y Creado por <span>LA CLAVE ARGENTINA</span> & <span>TIENDA SSH</span></div>
    </footer>

    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        
        let curP = 1; const perP = 32; let totalR = 0;
        const falls = [
            'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800',
            'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800',
            'https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800'
        ];

        function getImg(c, i) {
            const yt = c.url.match(/(?:youtube\.com.*[?&]v=|youtu\.be\/)([^"&?\/\s]{11})/);
            if (yt) return `https://i.ytimg.com/vi/${yt[1]}/mqdefault.jpg`;
            if (c.imagen_url && c.imagen_url.startsWith('http') && !c.imagen_url.includes('logo')) return c.imagen_url;
            return falls[i % falls.length];
        }

        async function fetchContent() {
            const grid = document.getElementById('grid');
            const q = document.getElementById('q-in').value.trim();
            const ct = document.getElementById('cat-sel').value;
            const pl = document.getElementById('plat-sel').value;
            
            document.getElementById('loader').style.display = 'block';
            grid.innerHTML = '';

            let params = new URLSearchParams();
            params.set('select', '*,categorias(nombre)');
            params.set('limit', perP);
            params.set('offset', (curP - 1) * perP);
            params.set('order', 'creado_el.desc');

            if (q) params.set('or', `(titulo.ilike.*${q}*,descripcion.ilike.*${q}*)`);
            if (ct) params.set('categorias.nombre', `eq.${ct}`);
            if (pl) params.set('plataforma', `eq.${pl}`);

            try {
                const response = await fetch(`${S_URL}cursos?${params.toString()}`, { headers });
                const data = await response.json();
                document.getElementById('loader').style.display = 'none';
                
                if (data.length === 0) {
                    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; color:#64748b;">No encontramos cursos. Probá otra palabra.</div>';
                }

                data.forEach((c, i) => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.onclick = () => window.open(c.url, '_blank');
                    div.innerHTML = `
                        <div class="card-img">
                            <div class="badge">GRATIS</div>
                            <img src="${getImg(c, i)}" onerror="this.src='${falls[0]}'">
                        </div>
                        <div class="card-body">
                            <div class="plat-name">${c.plataforma}</div>
                            <h3>${c.titulo}</h3>
                            <p>${c.descripcion || ''}</p>
                        </div>`;
                    grid.appendChild(div);
                });
                updateStats(q, ct, pl);
            } catch(e) { console.error(e); }
        }

        async function updateStats(q, ct, pl) {
            let params = new URLSearchParams();
            params.set('select', 'count');
            if (q) params.set('or', `(titulo.ilike.*${q}*,descripcion.ilike.*${q}*)`);
            if (ct) params.set('categorias.nombre', `eq.${ct}`);
            if (pl) params.set('plataforma', `eq.${pl}`);

            const r = await fetch(`${S_URL}cursos?${params.toString()}`, { headers });
            const d = await r.json();
            totalR = d[0].count;
            document.getElementById('total-count').innerText = totalR.toLocaleString();
            renderPagi();
        }

        function renderPagi() {
            const wrap = document.getElementById('pagi');
            wrap.innerHTML = '';
            const tP = Math.ceil(totalR / perP);
            if (tP <= 1) return;
            for (let i = Math.max(1, curP - 2); i <= Math.min(tP, curP + 2); i++) {
                const b = document.createElement('button');
                b.innerText = i;
                if (i === curP) b.className = 'active';
                b.onclick = () => { curP = i; fetchContent(); window.scrollTo(0,0); };
                wrap.appendChild(b);
            }
        }

        async function init() {
            try {
                const [rc, rp] = await Promise.all([
                    fetch(S_URL + 'categorias?select=nombre', { headers }).then(r => r.json()),
                    fetch(S_URL + 'cursos?select=plataforma', { headers }).then(r => r.json())
                ]);
                const cs = document.getElementById('cat-sel');
                rc.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c => {
                    const o = document.createElement('option'); o.value = c.nombre; o.innerText = c.nombre; cs.appendChild(o);
                });
                const ps = document.getElementById('plat-sel');
                [...new Set(rp.map(p => p.plataforma))].sort().forEach(p => {
                    if(p) {
                        const o = document.createElement('option'); o.value = p; o.innerText = p; ps.appendChild(o);
                    }
                });
                fetchContent();
            } catch(e) { console.error(e); }
        }

        document.getElementById('q-in').addEventListener('input', () => { curP = 1; clearTimeout(window.t); window.t = setTimeout(fetchContent, 600); });
        document.getElementById('cat-sel').addEventListener('change', () => { curP = 1; fetchContent(); });
        document.getElementById('plat-sel').addEventListener('change', () => { curP = 1; fetchContent(); });
        init();
    </script>
</body>
</html>
