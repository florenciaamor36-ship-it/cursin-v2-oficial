<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Clave Academy | Educación con Propósito</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --dark: #000; --surface: #111; --text: #fff; --dim: #b3b3b3; --blue: #2563eb; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); overflow-x: hidden; width: 100%; }
        header { padding: 40px 15px 60px; text-align: center; background: linear-gradient(to bottom, #1a1a1a, #000); border-bottom: 4px solid var(--brand); }
        .stats-badge { display: inline-block; background: var(--brand); color: #fff; padding: 8px 20px; border-radius: 50px; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 0.75rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 2.5rem; font-weight: 900; letter-spacing: -1.5px; line-height: 1; }
        @media (min-width: 768px) { .logo { font-size: 4.5rem; letter-spacing: -3px; } }
        .logo span { color: var(--brand); }
        .tagline { font-size: 1rem; color: var(--gold); margin-top: 10px; font-weight: 600; }
        @media (min-width: 768px) { .tagline { font-size: 1.4rem; } }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 15px; width: 100%; }
        .search-box { max-width: 1100px; margin: -30px auto 40px; background: #fff; padding: 20px; border-radius: 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative; z-index: 100; }
        @media (min-width: 768px) { .search-box { padding: 35px; border-radius: 30px; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px; margin-top: -50px; } }
        .search-box input, .search-box select { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; font-size: 1rem; color: #111; outline: none; font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 50px; }
        @media (min-width: 768px) { .grid { gap: 40px; margin-bottom: 80px; } }
        .card { background: var(--surface); border-radius: 20px; overflow: hidden; border: 1px solid #222; display: flex; flex-direction: column; height: 480px; cursor: pointer; transition: 0.3s; }
        @media (min-width: 768px) { .card { border-radius: 25px; height: 520px; } .card:hover { transform: translateY(-10px); border-color: var(--brand); } }
        .card-img { height: 200px; background: #000; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
        @media (min-width: 768px) { .card-img { height: 240px; } }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 15px; left: 15px; background: var(--brand); color: #fff; padding: 6px 12px; border-radius: 8px; font-weight: 900; font-size: 0.65rem; text-transform: uppercase; z-index: 10; }
        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .academy { color: var(--blue); font-weight: 800; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; }
        .card h3 { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; margin-bottom: 10px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card p { color: var(--dim); font-size: 0.9rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 40px 0 80px; flex-wrap: wrap; }
        .pagi-btn { padding: 12px 15px; border: 2px solid #333; background: var(--surface); color: #fff; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 0.8rem; }
        .pagi-num { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 2px solid #333; font-weight: 800; cursor: pointer; font-size: 0.9rem; }
        .pagi-num.active { background: var(--brand); border-color: var(--brand); }
        footer { padding: 60px 15px; text-align: center; border-top: 2px solid #111; }
        .footer-logo { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; font-weight: 900; margin-bottom: 20px; }
        .footer-logo span { color: var(--brand); }
        .credits { margin-top: 30px; font-weight: 800; font-size: 1rem; }
        .credits span { color: var(--brand); }
        #loader-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { width: 50px; height: 50px; border: 5px solid #222; border-top-color: var(--brand); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader-wrap"><div class="spinner"></div><p style="font-weight:900; color:var(--gold)">LA CLAVE ACADEMY</p></div>
    <header>
        <div class="stats-badge">⚡ <span id="count">...</span> CURSOS LIBRES</div>
        <div class="logo">LA CLAVE<span> ACADEMY</span></div>
        <p class="tagline">La Clave Argentina: Tu Pasaporte al Conocimiento</p>
    </header>
    <div class="container">
        <div class="search-box">
            <input type="text" id="q" placeholder="Buscar curso...">
            <select id="cat"><option value="">Categorías</option></select>
            <select id="plat"><option value="">Academias</option></select>
        </div>
        <div id="grid" class="grid"></div>
        <div id="pagi" class="pagination"></div>
    </div>
    <footer>
        <div class="footer-logo">LA CLAVE<span> ACADEMY</span></div>
        <div style="color:var(--dim); line-height:1.8; max-width:800px; margin:0 auto; font-size:0.8rem;">© 2026 LA CLAVE ARGENTINA. Todos los derechos reservados.</div>
        <div class="credits">Diseñado por <span>LA CLAVE ARGENTINA</span> & <span>TIENDA SSH</span></div>
    </footer>
    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        let page = 1; const limit = 20; let total = 0;
        const falls = ['https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800'];
        function getImg(c) {
            const yt = c.url.match(/(?:youtube\.com.*v=|youtu\.be\/)([^"&?\/\s]{11})/);
            if (yt) return `https://i.ytimg.com/vi/${yt[1]}/mqdefault.jpg`;
            if (c.imagen_url && c.imagen_url.includes('http') && !c.imagen_url.toLowerCase().includes('placeholder')) return c.imagen_url;
            return falls[0];
        }
        async function fetchAll() {
            const grid = document.getElementById('grid');
            const loader = document.getElementById('loader-wrap');
            const q = document.getElementById('q').value.trim();
            const ct = document.getElementById('cat').value;
            const pl = document.getElementById('plat').value;
            loader.style.display = 'flex'; grid.innerHTML = '';
            let u = `${S_URL}cursos?select=*,categorias(nombre)&limit=${limit}&offset=${(page-1)*limit}`;
            if (q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if (ct) u += `&categorias.nombre=eq.${encodeURIComponent(ct)}`;
            if (pl) u += `&plataforma=eq.${encodeURIComponent(pl)}`;
            u += '&order=creado_el.desc';
            try {
                const r = await fetch(u, { headers });
                const data = await r.json();
                loader.style.display = 'none';
                if(!data || data.length === 0) { grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:50px;">No hay resultados.</p>'; }
                data.forEach(c => {
                    const d = document.createElement('div'); d.className = 'card'; d.onclick = () => window.open(c.url, '_blank');
                    d.innerHTML = `<div class="card-img"><div class="badge">OFICIAL</div><img src="${getImg(c)}" onerror="this.src='${falls[0]}'"></div>
                        <div class="card-body"><div class="academy">${c.plataforma}</div><h3>${c.titulo}</h3><p>${c.descripcion || ''}</p></div>`;
                    grid.appendChild(d);
                });
                updateStats(q, ct, pl);
            } catch (e) { loader.style.display = 'none'; }
        }
        async function updateStats(q, ct, pl) {
            let u = `${S_URL}cursos?select=count`;
            if (q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if (ct) u += `&categorias.nombre=eq.${encodeURIComponent(ct)}`;
            if (pl) u += `&plataforma=eq.${encodeURIComponent(pl)}`;
            try { const r = await fetch(u, { headers }); const d = await r.json(); total = d[0].count; document.getElementById('count').innerText = total.toLocaleString(); renderPagi(); } catch(e){}
        }
        function renderPagi() {
            const wrap = document.getElementById('pagi'); wrap.innerHTML = '';
            const tP = Math.ceil(total / limit); if (tP <= 1) return;
            const prev = document.createElement('button'); prev.className = 'pagi-btn'; prev.innerHTML = '←'; prev.disabled = page === 1;
            prev.onclick = () => { page--; fetchAll(); window.scrollTo(0,0); }; wrap.appendChild(prev);
            for (let i = Math.max(1, page - 1); i <= Math.min(tP, page + 1); i++) {
                const b = document.createElement('button'); b.className = `pagi-num ${i === page ? 'active' : ''}`; b.innerText = i;
                b.onclick = () => { page = i; fetchAll(); window.scrollTo(0,0); }; wrap.appendChild(b);
            }
            const next = document.createElement('button'); next.className = 'pagi-btn'; next.innerHTML = '→'; next.disabled = page === tP;
            next.onclick = () => { page++; fetchAll(); window.scrollTo(0,0); }; wrap.appendChild(next);
        }
        async function init() {
            try {
                const [rc, rp] = await Promise.all([
                    fetch(S_URL+'categorias?select=nombre', {headers}).then(r=>r.json()),
                    fetch(S_URL+'cursos?select=plataforma', {headers}).then(r=>r.json())
                ]);
                const cs = document.getElementById('cat'); rc.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c=>{ const o=document.createElement('option'); o.value=o.innerText=c.nombre; cs.appendChild(o); });
                const ps = document.getElementById('plat'); [...new Set(rp.map(p=>p.plataforma))].sort().forEach(p=>{ if(p) { const o=document.createElement('option'); o.value=o.innerText=p; document.getElementById('plat').appendChild(o); } });
                fetchAll();
            } catch(e) { fetchAll(); }
        }
        document.getElementById('q').oninput = () => { page=1; clearTimeout(window.t); window.t=setTimeout(fetchAll, 600); };
        document.getElementById('cat').onchange = () => { page=1; fetchAll(); };
        document.getElementById('plat').onchange = () => { page=1; fetchAll(); };
        init();
    </script>
</body>
</html>
