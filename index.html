<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Clave Academy | Educación con Propósito</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --dark: #000; --card: #121212; --text: #fff; --dim: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); overflow-x: hidden; }
        header { padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--brand); }
        .logo { font-family: 'Montserrat'; font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--brand); }
        .tagline { color: var(--gold); font-size: 0.9rem; margin-top: 5px; font-weight: 600; text-transform: uppercase; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .search-area { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 30px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        @media (min-width: 768px) { .search-area { flex-direction: row; padding: 25px; margin-top: -50px; } }
        input, select { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #ccc; font-size: 1rem; color: #000; font-weight: 600; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        @media (min-width: 1000px) { .grid { grid-template-columns: 1fr 1fr 1fr 1fr; } }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #222; text-decoration: none; color: inherit; height: 100%; }
        .card-img { width: 100%; height: 180px; background: #000; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-info span { color: var(--brand); font-weight: 800; font-size: 0.7rem; text-transform: uppercase; }
        .card-info h3 { font-size: 1.1rem; margin: 8px 0; font-family: 'Montserrat'; line-height: 1.2; height: 2.4em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card-info p { font-size: 0.85rem; color: var(--dim); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .pagi { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 30px; padding-bottom: 50px; }
        .btn-pg { padding: 12px 20px; background: var(--card); border: 1px solid #333; color: #fff; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-pg:disabled { opacity: 0.3; cursor: not-allowed; }
        footer { text-align: center; padding: 40px 20px; border-top: 1px solid #111; font-size: 0.8rem; color: var(--dim); }
        .loader { text-align: center; padding: 50px; font-weight: 800; color: var(--gold); }
    </style>
</head>
<body>
    <header><div class="logo">LA CLAVE<span> ACADEMY</span></div><p class="tagline">La Clave Argentina</p></header>
    <div class="container">
        <div class="search-area"><input type="text" id="in-q" placeholder="Buscar curso..."><select id="sel-cat"><option value="">Temas</option></select><select id="sel-pla"><option value="">Academias</option></select></div>
        <div id="loader" class="loader">CARGANDO...</div>
        <div id="grid" class="grid"></div>
        <div id="pagi" class="pagi"></div>
    </div>
    <footer>© 2026 LA CLAVE ARGENTINA.</footer>
    <script>
        const API_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const API_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': API_KEY, 'Authorization': 'Bearer ' + API_KEY };
        let page = 1; const perPage = 20; let total = 0;
        function getImg(c) {
            const yt = c.url.match(/(?:youtube\.com.*v=|youtu\.be\/)([^"&?\/\s]{11})/);
            if (yt) return `https://i.ytimg.com/vi/${yt[1]}/mqdefault.jpg`;
            if (c.imagen_url && c.imagen_url.includes('http') && !c.imagen_url.toLowerCase().includes('placeholder')) return c.imagen_url;
            return 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800';
        }
        async function load() {
            const grid = document.getElementById('grid'); const loader = document.getElementById('loader');
            const q = document.getElementById('in-q').value.trim(); const cat = document.getElementById('sel-cat').value; const pla = document.getElementById('sel-pla').value;
            loader.style.display = 'block'; grid.innerHTML = '';
            let url = `${API_URL}cursos?select=*,categorias!inner(nombre)&limit=${perPage}&offset=${(page-1)*perPage}`;
            if(q) url += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if(cat) url += `&categorias.nombre=eq.${encodeURIComponent(cat)}`;
            if(pla) url += `&plataforma=eq.${encodeURIComponent(pla)}`;
            url += '&order=creado_el.desc';
            try {
                const res = await fetch(url, { headers }); const data = await res.json(); loader.style.display = 'none';
                if(!data || data.length === 0) { grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;">No hay resultados.</p>'; }
                else { data.forEach(c => {
                    const a = document.createElement('a'); a.className = 'card'; a.href = c.url; a.target = '_blank';
                    a.innerHTML = `<div class="card-img"><img src="${getImg(c)}"></div><div class="card-info"><span>${c.plataforma}</span><h3>${c.titulo}</h3><p>${c.descripcion || ''}</p></div>`;
                    grid.appendChild(a);
                }); }
                updateCount(q, cat, pla);
            } catch(e) { loader.innerText = "Error."; }
        }
        async function updateCount(q, cat, pla) {
            let url = `${API_URL}cursos?select=count,categorias!inner(nombre)`;
            if(q) url += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if(cat) url += `&categorias.nombre=eq.${encodeURIComponent(cat)}`;
            if(pla) url += `&plataforma=eq.${encodeURIComponent(pla)}`;
            const res = await fetch(url, { headers }); const data = await res.json(); total = data[0].count; renderPagi();
        }
        function renderPagi() {
            const wrap = document.getElementById('pagi'); wrap.innerHTML = ''; const totalPages = Math.ceil(total/perPage); if(totalPages <= 1) return;
            const prev = document.createElement('button'); prev.className = 'btn-pg'; prev.innerText = '←'; prev.disabled = page === 1;
            prev.onclick = () => { page--; load(); window.scrollTo(0,0); }; wrap.appendChild(prev);
            const next = document.createElement('button'); next.className = 'btn-pg'; next.innerText = '→'; next.disabled = page === totalPages;
            next.onclick = () => { page++; load(); window.scrollTo(0,0); }; wrap.appendChild(next);
        }
        async function init() {
            try {
                const [rc, rp] = await Promise.all([ fetch(API_URL+'categorias?select=nombre', {headers}).then(r=>r.json()), fetch(API_URL+'cursos?select=plataforma', {headers}).then(r=>r.json()) ]);
                const sc = document.getElementById('sel-cat'); rc.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c=>{ const o=document.createElement('option'); o.value=o.innerText=c.nombre; sc.appendChild(o); });
                const sp = document.getElementById('sel-pla'); [...new Set(rp.map(p=>p.plataforma))].sort().forEach(p=>{ if(p) { const o=document.createElement('option'); o.value=o.innerText=p; sp.appendChild(o); } });
                load();
            } catch(e) { load(); }
        }
        document.getElementById('in-q').oninput = () => { page=1; clearTimeout(window.t); window.t=setTimeout(load, 700); };
        document.getElementById('sel-cat').onchange = () => { page=1; load(); };
        document.getElementById('sel-pla').onchange = () => { page=1; load(); };
        init();
    </script>
</body>
</html>
