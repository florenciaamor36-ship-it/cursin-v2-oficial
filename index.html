<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Clave Academy | Educación de Élite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --dark: #000; --surface: #121212; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); }
        header { padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--brand); background: #000; }
        .logo { font-family: 'Montserrat'; font-size: 2.5rem; font-weight: 900; }
        .logo span { color: var(--brand); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .search-box { background: #fff; padding: 20px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; margin-top: -40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        @media (min-width: 768px) { .search-box { flex-direction: row; } }
        input, select { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; color: #000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: var(--surface); border-radius: 15px; overflow: hidden; border: 1px solid #333; transition: 0.3s; text-decoration: none; color: inherit; height: 450px; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--brand); transform: translateY(-5px); }
        .card-img { height: 180px; position: relative; background: #000; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; background: var(--brand); padding: 5px 10px; font-size: 0.7rem; font-weight: 900; border-radius: 5px; }
        .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .card-body h3 { font-family: 'Montserrat'; font-size: 1.1rem; margin-bottom: 10px; height: 2.6em; overflow: hidden; }
        .card-body p { font-size: 0.9rem; color: #aaa; overflow: hidden; }
        .pagi { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 40px 0; }
        .btn { padding: 10px 20px; background: var(--surface); border: 1px solid #444; color: #fff; cursor: pointer; border-radius: 8px; font-weight: 700; }
        .btn:disabled { opacity: 0.3; }
        .btn.active { background: var(--brand); border-color: var(--brand); }
        #loader { text-align: center; padding: 50px; font-weight: 900; color: var(--gold); }
    </style>
</head>
<body>
    <header>
        <div class="logo">LA CLAVE<span> ACADEMY</span></div>
    </header>
    <div class="container">
        <div class="search-box">
            <input type="text" id="q" placeholder="Buscar curso...">
            <select id="plat"><option value="">Todas las Academias</option></select>
        </div>
        <div id="loader">CARGANDO CURSOS...</div>
        <div id="grid" class="grid"></div>
        <div id="pagi" class="pagi"></div>
    </div>
    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        let page = 1; const limit = 20; let total = 0;
        function getImg(c) {
            const yt = c.url.match(/(?:youtube\.com.*v=|youtu\.be\/)([^"&?\/\s]{11})/);
            if (yt) return `https://i.ytimg.com/vi/${yt[1]}/mqdefault.jpg`;
            return c.imagen_url || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800';
        }
        async function load() {
            const g = document.getElementById('grid'); const l = document.getElementById('loader');
            const q = document.getElementById('q').value; const p = document.getElementById('plat').value;
            l.style.display = 'block'; g.innerHTML = '';
            let u = `${S_URL}cursos?select=*&limit=${limit}&offset=${(page-1)*limit}`;
            if (q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if (p) u += `&plataforma=eq.${encodeURIComponent(p)}`;
            u += '&order=creado_el.desc';
            try {
                const res = await fetch(u, { headers: { ...headers, 'Prefer': 'count=exact' } });
                const head = res.headers.get('content-range'); if (head) total = parseInt(head.split('/')[1]);
                const data = await res.json(); l.style.display = 'none';
                data.forEach(c => {
                    const card = document.createElement('a'); card.className = 'card'; card.href = c.url; card.target = '_blank';
                    card.innerHTML = `<div class="card-img"><div class="badge">OFICIAL</div><img src="${getImg(c)}"></div>
                        <div class="card-body"><small style="color:var(--brand)">${c.plataforma}</small><h3>${c.titulo}</h3><p>${c.descripcion || ''}</p></div>`;
                    g.appendChild(card);
                });
                renderPagi();
            } catch (e) { l.innerText = "ERROR AL CARGAR. POR FAVOR REFRESQUE."; }
        }
        function renderPagi() {
            const w = document.getElementById('pagi'); w.innerHTML = ''; const tP = Math.ceil(total / limit); if (tP <= 1) return;
            const b1 = document.createElement('button'); b1.className = 'btn'; b1.innerText = '←'; b1.disabled = page === 1;
            b1.onclick = () => { page--; load(); window.scrollTo(0,0); }; w.appendChild(b1);
            const n = document.createElement('button'); n.className = 'btn active'; n.innerText = page; w.appendChild(n);
            const b2 = document.createElement('button'); b2.className = 'btn'; b2.innerText = '→'; b2.disabled = page === tP;
            b2.onclick = () => { page++; load(); window.scrollTo(0,0); }; w.appendChild(b2);
        }
        async function init() {
            load();
            try {
                const rp = await fetch(S_URL+'cursos?select=plataforma', {headers}).then(r=>r.json());
                const sp = document.getElementById('plat');
                [...new Set(rp.map(x=>x.plataforma))].sort().forEach(p => {
                    if(p) { const o = document.createElement('option'); o.value = o.innerText = p; sp.appendChild(o); }
                });
            } catch(e) {}
        }
        document.getElementById('q').oninput = () => { page=1; clearTimeout(window.t); window.t=setTimeout(load, 600); };
        document.getElementById('plat').onchange = () => { page=1; load(); };
        init();
    </script>
</body>
</html>
