<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Clave Academy | Educación de Élite Gratuita</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --dark: #000; --surface: #111; --border: #222; --text: #fff; --text-dim: #b0b0b0; --blue: #2563eb; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); overflow-x: hidden; }
        header { padding: 80px 20px 80px; background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%); border-bottom: 4px solid var(--brand); text-align: center; }
        .logo { font-family: 'Montserrat'; font-size: clamp(2.2rem, 10vw, 4rem); font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; }
        .logo span { color: var(--brand); }
        .hero-desc { max-width: 800px; margin: 0 auto 30px; color: var(--text-dim); font-size: 1.1rem; line-height: 1.5; padding: 0 15px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 15px; }
        .search-area { background: #fff; padding: 25px; border-radius: 20px; margin: -45px auto 50px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); position: relative; z-index: 500; }
        @media (min-width: 768px) { .search-area { flex-direction: row; padding: 30px; border-radius: 30px; } }
        .search-area input, .search-area select { flex: 1; padding: 14px 18px; border-radius: 12px; border: 2px solid #eee; font-size: 1rem; color: #000; font-weight: 600; min-height: 54px; width: 100%; outline:none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 60px; }
        .card { background: var(--surface); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; height: 500px; text-decoration: none; color: inherit; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-8px); border-color: var(--brand); }
        .card-header { height: 200px; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .card-header img.main-thumb { width: 100%; height: 100%; object-fit: cover; }
        .plat-logo-wrap { position: absolute; top: 12px; right: 12px; width: 42px; height: 42px; background: #fff; border-radius: 10px; padding: 5px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        .plat-logo-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .badge-oficial { position: absolute; top: 12px; left: 12px; background: var(--brand); color: #fff; padding: 5px 10px; border-radius: 6px; font-weight: 900; font-size: 0.6rem; text-transform: uppercase; z-index: 10; }
        .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .plat-name { color: var(--blue); font-weight: 800; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; }
        .card h3 { font-family: 'Montserrat'; font-size: 1.15rem; line-height: 1.3; color: #fff; margin-bottom: 10px; height: 2.6em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card p { color: var(--text-dim); font-size: 0.88rem; line-height: 1.5; height: 4.5em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; margin: 0; }
        .pagi { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 40px 0 100px; flex-wrap: wrap; }
        .btn-nav { padding: 12px 18px; background: var(--surface); border: 2px solid var(--border); color: #fff; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 0.8rem; }
        .btn-nav:disabled { opacity: 0.2; cursor: not-allowed; }
        .num-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 2px solid var(--border); border-radius: 10px; font-weight: 800; cursor: pointer; color: #fff; }
        .num-btn.active { background: var(--brand); border-color: var(--brand); box-shadow: 0 4px 12px rgba(255,0,0,0.3); }
        footer { background: #000; padding: 60px 20px; border-top: 1px solid var(--border); text-align: center; }
        .legal-box { max-width: 800px; margin: 20px auto; color: #444; font-size: 0.75rem; line-height: 1.6; }
        #main-loader { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .spin { width: 40px; height: 40px; border: 4px solid #222; border-top-color: var(--brand); border-radius: 50%; animation: rot 0.8s linear infinite; }
        @keyframes rot { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="main-loader"><div class="spin"></div><p style="font-family:Montserrat; font-weight:900; color:var(--gold); font-size:0.8rem; letter-spacing:2px">PROCESANDO EVIDENCIAS...</p></div>
    <header>
        <h1 class="logo">LA CLAVE<span> ACADEMY</span></h1>
        <p class="hero-desc">Explora <span id="t-span" style="color:var(--gold); font-weight:900">...</span> cursos oficiales gratuitos de las mejores academias del mundo.</p>
    </header>
    <div class="container">
        <div class="search-area">
            <input type="text" id="q" placeholder="¿Qué quieres estudiar hoy?">
            <select id="plat"><option value="">Todas las Academias</option></select>
        </div>
        <div id="grid" class="grid"></div>
        <div id="pagi" class="pagi"></div>
    </div>
    <footer>
        <div class="legal-box">© 2026 LA CLAVE ARGENTINA. Todos los derechos reservados. <br> Ley de Propiedad Intelectual 11.723.</div>
    </footer>
    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        let page = 1; const limit = 20; let total = 0;
        const LOGOS = { 'google': 'https://www.gstatic.com/images/branding/product/2x/googleg_96dp.png', 'microsoft': 'https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg', 'ibm': 'https://upload.wikimedia.org/wikipedia/commons/5/51/IBM_logo.svg', 'meta': 'https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg', 'coursera': 'https://upload.wikimedia.org/wikipedia/commons/9/97/Coursera-Logo_600x600.svg', 'edx': 'https://upload.wikimedia.org/wikipedia/commons/8/8f/EdX_logo_2021.svg', 'unam': 'https://upload.wikimedia.org/wikipedia/commons/c/c8/Escudo-UNAM-escalable.svg', 'cisco': 'https://upload.wikimedia.org/wikipedia/commons/0/08/Cisco_logo_blue_2016.svg', 'youtube': 'https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg' };
        const FALLS = ['https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800','https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800'];
        function getImg(c, i) {
            const yt = c.url.match(/(?:youtube\.com.*v=|youtu\.be\/)([^"&?\/\s]{11})/);
            if (yt) return `https://i.ytimg.com/vi/${yt[1]}/hqdefault.jpg`;
            if (c.imagen_url && c.imagen_url.includes('http')) return c.imagen_url;
            return FALLS[i % FALLS.length];
        }
        function getPlatLogo(p) {
            const low = p.toLowerCase();
            for(let k in LOGOS) { if(low.includes(k)) return LOGOS[k]; }
            return 'https://cdn-icons-png.flaticon.com/512/3429/3429141.png';
        }
        async function load() {
            const g = document.getElementById('grid'); const l = document.getElementById('main-loader');
            const q = document.getElementById('q').value.trim(); const pl = document.getElementById('plat').value;
            l.style.display = 'flex';
            let u = `${S_URL}cursos?select=*,categorias!inner(nombre)&limit=${limit}&offset=${(page-1)*limit}`;
            if (q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if (pl) u += `&plataforma=eq.${encodeURIComponent(pl)}`;
            u += '&order=creado_el.desc';
            try {
                const res = await fetch(u, { headers: { ...headers, 'Prefer': 'count=exact' } });
                const cHead = res.headers.get('content-range'); if (cHead) { total = parseInt(cHead.split('/')[1]); document.getElementById('t-span').innerText = total.toLocaleString(); }
                const data = await res.json(); l.style.display = 'none'; g.innerHTML = '';
                data.forEach((c, i) => {
                    const card = document.createElement('a'); card.className = 'card'; card.href = c.url; card.target = '_blank';
                    card.innerHTML = `<div class="card-header"><div class="badge-oficial">OFICIAL</div><div class="plat-logo-wrap"><img src="${getPlatLogo(c.plataforma)}" alt="logo"></div><img src="${getImg(c, i)}" class="main-thumb" loading="lazy" onerror="this.src='${FALLS[1]}'"></div>
                        <div class="card-body"><div class="plat-name">${c.plataforma}</div><h3>${c.titulo}</h3><p>${c.descripcion || 'Accede a esta formación certificada hoy mismo.'}</p></div>`;
                    g.appendChild(card);
                });
                renderPagi();
            } catch (e) { l.style.display = 'none'; }
        }
        function renderPagi() {
            const w = document.getElementById('pagi'); w.innerHTML = ''; const tP = Math.ceil(total / limit); if (tP <= 1) return;
            const b1 = document.createElement('button'); b1.className = 'btn-nav'; b1.innerText = '←'; b1.disabled = page === 1;
            b1.onclick = () => { page--; load(); window.scrollTo({top: 400, behavior: 'smooth'}); }; w.appendChild(b1);
            let s = Math.max(1, page - 1); let e = Math.min(tP, page + 1);
            if (page === 1) e = Math.min(tP, 3); if (page === tP) s = Math.max(1, tP - 2);
            for (let i = s; i <= e; i++) {
                const b = document.createElement('button'); b.className = `num-btn ${i === page ? 'active' : ''}`; b.innerText = i;
                b.onclick = () => { page = i; load(); window.scrollTo({top: 400, behavior: 'smooth'}); }; w.appendChild(b);
            }
            const b2 = document.createElement('button'); b2.className = 'btn-nav'; b2.innerText = '→'; b2.disabled = page === tP;
            b2.onclick = () => { page++; load(); window.scrollTo({top: 400, behavior: 'smooth'}); }; w.appendChild(b2);
        }
        async function init() {
            load();
            try {
                const rp = await fetch(S_URL+'cursos?select=plataforma', {headers}).then(r=>r.json());
                const sp = document.getElementById('plat'); [...new Set(rp.map(p=>p.plataforma))].sort().forEach(p=>{ if(p) { const o=document.createElement('option'); o.value=o.innerText=p; sp.appendChild(o); } });
            } catch(e) {}
        }
        document.getElementById('q').oninput = () => { page=1; clearTimeout(window.t); window.t=setTimeout(load, 700); };
        document.getElementById('plat').onchange = () => { page=1; load(); };
        init();
    </script>
</body>
</html>
