<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Clave Academy | Cursos Gratuitos con Certificación Oficial</title>
    <meta name="description" content="Encuentra más de 65,000 cursos gratuitos de Google, IBM, Microsoft y las mejores universidades.">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --bg: #050505; --surface: #0f0f0f; --border: rgba(255,255,255,0.08); --text-main: #fff; --text-dim: #999; --accent-blue: #0070f3; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); overflow-x: hidden; line-height: 1.5; }
        header { min-height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px 20px; background: radial-gradient(circle at center, #111 0%, #000 100%); border-bottom: 1px solid var(--border); }
        .hero-title { font-family: 'Montserrat'; font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900; letter-spacing: -3px; line-height: 1; margin-bottom: 20px; }
        .hero-title span { color: var(--brand); }
        .hero-tagline { max-width: 800px; font-size: 1.4rem; font-weight: 300; color: var(--text-main); margin-bottom: 40px; }
        .metric-bar { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .metric-item { background: var(--surface); border: 1px solid var(--border); padding: 15px 25px; border-radius: 15px; text-align: center; min-width: 150px; }
        .metric-item div:first-child { color: var(--gold); font-weight: 900; font-size: 1.4rem; font-family: 'Montserrat'; }
        .metric-item div:last-child { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 25px; }
        .search-wrap { margin: -40px auto 80px; z-index: 100; position: relative; max-width: 1000px; }
        .search-box { background: #fff; padding: 10px; border-radius: 100px; display: flex; flex-direction: column; gap: 5px; box-shadow: 0 40px 80px rgba(0,0,0,0.7); }
        @media (min-width: 768px) { .search-box { flex-direction: row; padding: 10px 30px; } }
        .search-box input, .search-box select { background: transparent; border: none; padding: 15px; font-size: 1rem; font-weight: 600; color: #000; outline: none; flex: 1; }
        .search-box select { cursor: pointer; color: #666; border-left: 1px solid #eee; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-bottom: 100px; }
        .c-card { background: var(--surface); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; height: 560px; text-decoration: none; color: inherit; transition: 0.3s; position: relative; }
        .c-card:hover { transform: translateY(-10px); border-color: rgba(255,255,255,0.2); }
        .c-img { height: 220px; background: #000; position: relative; }
        .c-img img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
        .c-logo-badge { position: absolute; bottom: -20px; right: 25px; width: 55px; height: 55px; background: #fff; border-radius: 14px; padding: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 10; }
        .c-logo-badge img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .c-body { padding: 40px 25px 25px; flex: 1; display: flex; flex-direction: column; }
        .c-plat { font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: var(--accent-blue); letter-spacing: 1px; margin-bottom: 10px; }
        .c-card h3 { font-family: 'Montserrat'; font-size: 1.25rem; font-weight: 800; line-height: 1.3; color: #fff; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.6em; }
        .c-meta { display: flex; gap: 15px; margin-bottom: 15px; }
        .c-meta-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--text-dim); font-weight: 600; background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 6px; }
        .c-desc { color: #888; font-size: 0.9rem; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .pagi { display: flex; justify-content: center; gap: 10px; margin-bottom: 100px; }
        .p-btn { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: #fff; font-weight: 700; cursor: pointer; }
        .p-btn.active { background: var(--brand); border-color: var(--brand); }
        footer { padding: 100px 20px; background: #000; border-top: 1px solid var(--border); text-align: center; }
        .f-logo { font-family: 'Montserrat'; font-size: 2rem; font-weight: 900; margin-bottom: 20px; }
        .f-logo span { color: var(--brand); }
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .spin { width: 40px; height: 40px; border: 3px solid #222; border-top-color: var(--brand); border-radius: 50%; animation: r 0.8s linear infinite; }
        @keyframes r { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader"><div class="spin"></div></div>
    <header>
        <h1 class="hero-title">LA CLAVE<br><span>ACADEMY</span></h1>
        <p class="hero-tagline">La plataforma de búsqueda educativa para estudiantes de élite. Encuentra cursos gratuitos con certificación oficial en segundos.</p>
        <div class="metric-bar">
            <div class="metric-item"><div id="m-cursos">65,000+</div><div>Cursos Activos</div></div>
            <div class="metric-item"><div>400+</div><div>Instituciones</div></div>
            <div class="metric-item"><div>100%</div><div>Gratuito</div></div>
        </div>
    </header>
    <div class="container">
        <div class="search-wrap"><div class="search-box"><input type="text" id="q" placeholder="¿Qué quieres dominar hoy?"><select id="plat"><option value="">Academias</option></select></div></div>
        <div id="grid" class="courses-grid"></div>
        <div id="pagi" class="pagi"></div>
    </div>
    <footer>
        <div class="f-logo">LA CLAVE<span> ACADEMY</span></div>
        <div style="font-size:0.75rem; color:#444; margin-top:20px;">© 2026 LA CLAVE ARGENTINA. Amparado por la Ley 11.723.</div>
    </footer>
    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        let page = 1; const limit = 16; let total = 0;
        const LOGO_MAP = { 'google': 'https://www.gstatic.com/images/branding/product/2x/googleg_96dp.png', 'microsoft': 'https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg', 'ibm': 'https://upload.wikimedia.org/wikipedia/commons/5/51/IBM_logo.svg', 'meta': 'https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg', 'unam': 'https://upload.wikimedia.org/wikipedia/commons/c/ca/Escudo-UNAM-escalable.svg', 'coursera': 'https://upload.wikimedia.org/wikipedia/commons/9/97/Coursera-Logo_600x600.svg', 'edx': 'https://upload.wikimedia.org/wikipedia/commons/8/8f/EdX_logo_2021.svg' };
        function getImg(c) {
            const yt = c.url.match(/(?:youtube\.com.*v=|youtu\.be\/)([^"&?\/\s]{11})/);
            if (yt) return `https://i.ytimg.com/vi/${yt[1]}/hqdefault.jpg`;
            return c.imagen_url || `https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&q=80`;
        }
        function getPlatLogo(p) {
            const low = p.toLowerCase();
            for(let k in LOGO_MAP) { if(low.includes(k)) return LOGO_MAP[k]; }
            return 'https://cdn-icons-png.flaticon.com/512/3429/3429141.png';
        }
        async function load() {
            const g = document.getElementById('grid'); const l = document.getElementById('loader');
            const q = document.getElementById('q').value.trim(); const pl = document.getElementById('plat').value;
            l.style.display = 'flex';
            let u = `${S_URL}cursos?select=*,categorias!inner(nombre)&limit=${limit}&offset=${(page-1)*limit}`;
            if (q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if (pl) u += `&plataforma=eq.${encodeURIComponent(pl)}`;
            u += '&order=creado_el.desc';
            try {
                const res = await fetch(u, { headers: { ...headers, 'Prefer': 'count=exact' } });
                const cHead = res.headers.get('content-range'); 
                if (cHead) { total = parseInt(cHead.split('/')[1]); document.getElementById('m-cursos').innerText = total.toLocaleString() + '+'; }
                const data = await res.json(); l.style.display = 'none'; g.innerHTML = '';
                data.forEach(c => {
                    const card = document.createElement('a'); card.className = 'c-card'; card.href = c.url; card.target = '_blank';
                    card.innerHTML = `<div class="c-img"><div class="c-logo-badge"><img src="${getPlatLogo(c.plataforma)}"></div><img src="${getImg(c)}" loading="lazy"></div>
                        <div class="c-body"><div class="c-plat">${c.plataforma}</div><h3>${c.titulo}</h3><div class="c-meta"><span class="c-meta-item">⏱️ A tu ritmo</span><span class="c-meta-item">📜 Certificado</span></div><p class="c-desc">${c.descripcion || ''}</p></div>`;
                    g.appendChild(card);
                });
                renderPagi();
            } catch (e) { l.style.display = 'none'; }
        }
        function renderPagi() {
            const w = document.getElementById('pagi'); w.innerHTML = ''; const tP = Math.ceil(total / limit); if (tP <= 1) return;
            let s = Math.max(1, page - 1); let e = Math.min(tP, page + 1);
            if (page === 1) e = Math.min(tP, 3); if (page === tP) s = Math.max(1, tP - 2);
            for (let i = s; i <= e; i++) {
                const b = document.createElement('button'); b.className = `p-btn ${i === page ? 'active' : ''}`; b.innerText = i;
                b.onclick = () => { page = i; load(); window.scrollTo({top: 400, behavior: 'smooth'}); }; w.appendChild(b);
            }
        }
        async function init() {
            load();
            try {
                const rp = await fetch(S_URL+'cursos?select=plataforma', {headers}).then(r=>r.json());
                const sp = document.getElementById('plat'); [...new Set(rp.map(p=>p.plataforma))].sort().forEach(p=>{ if(p) { const o=document.createElement('option'); o.value=o.innerText=p; sp.appendChild(o); } });
            } catch(e) {}
        }
        document.getElementById('q').oninput = () => { page=1; clearTimeout(window.t); window.t=setTimeout(load, 800); };
        document.getElementById('plat').onchange = () => { page=1; load(); };
        init();
    </script>
</body>
</html>
