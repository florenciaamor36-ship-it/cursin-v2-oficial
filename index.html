<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Clave Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --dark: #0a0a0a; --bg: #f4f6f9; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #1a1a1a; }
        header { background: var(--dark); color: white; padding: 40px 20px; text-align: center; border-bottom: 4px solid var(--brand); }
        .logo { font-family: 'Montserrat'; font-size: 2.5rem; font-weight: 900; margin: 0; }
        .logo span { color: var(--brand); }
        .search-wrap { max-width: 900px; margin: -30px auto 30px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; gap: 10px; position: relative; z-index: 10; }
        input, select { flex: 1; min-width: 200px; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #eee; transition: 0.2s; height: 100%; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--brand); transform: translateY(-5px); }
        .card-img { height: 150px; background: #000; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 15px; flex-grow: 1; }
        .pagi { display: flex; justify-content: center; gap: 5px; margin: 30px 0; }
        .pagi button { padding: 10px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px; }
        .pagi button.active { background: var(--brand); color: white; border-color: var(--brand); }
        footer { background: var(--dark); color: white; padding: 40px; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo">LA CLAVE<span> ACADEMY</span></div>
        <div id="total-count" style="color:var(--gold); font-weight:800; margin-top:10px;">Cargando...</div>
    </header>
    <div class="container">
        <div class="search-wrap">
            <input type="text" id="q" placeholder="Buscar curso...">
            <select id="cat"><option value="">Temas</option></select>
            <select id="plat"><option value="">Academias</option></select>
        </div>
        <div id="grid" class="grid"></div>
        <div id="pagi" class="pagi"></div>
    </div>
    <footer>© 2026 LA CLAVE ARGENTINA & TIENDA SSH.</footer>
    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        let curP = 1; const perP = 32;

        async function load() {
            const q = document.getElementById('q').value;
            const ct = document.getElementById('cat').value;
            const pl = document.getElementById('plat').value;
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:50px;">Buscando cursos...</div>';
            
            let u = `${S_URL}cursos?select=*,categorias(nombre)&limit=${perP}&offset=${(curP-1)*perP}`;
            if(q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if(ct) u += `&categorias.nombre=eq.${encodeURIComponent(ct)}`;
            if(pl) u += `&plataforma=eq.${encodeURIComponent(pl)}`;
            u += `&order=creado_el.desc&v=${Date.now()}`;
            
            try {
                const r = await fetch(u, { headers });
                const data = await r.json();
                grid.innerHTML = '';
                data.forEach(c => {
                    const d = document.createElement('div'); d.className = 'card';
                    d.onclick = () => window.open(c.url, '_blank');
                    d.innerHTML = `<div class="card-img"><img src="${c.imagen_url || 'https://via.placeholder.com/300x150?text=La+Clave'}"></div>
                                   <div class="card-body"><strong>${c.plataforma}</strong><br>${c.titulo}</div>`;
                    grid.appendChild(d);
                });
                count(q, ct, pl);
            } catch(e) { grid.innerHTML = 'Error de conexión.'; }
        }

        async function count(q, ct, pl) {
            let u = `${S_URL}cursos?select=count`;
            if(q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if(ct) u += `&categorias.nombre=eq.${encodeURIComponent(ct)}`;
            if(pl) u += `&plataforma=eq.${encodeURIComponent(pl)}`;
            const r = await fetch(u+`&v=${Date.now()}`, { headers });
            const d = await r.json();
            document.getElementById('total-count').innerText = d[0].count.toLocaleString() + ' CURSOS GRATUITOS';
            pagi(d[0].count);
        }

        function pagi(total) {
            const w = document.getElementById('pagi'); w.innerHTML = '';
            const tP = Math.ceil(total/perP);
            if(tP <= 1) return;
            for(let i=Math.max(1, curP-2); i<=Math.min(tP, curP+2); i++) {
                const b = document.createElement('button'); b.innerText = i;
                if(i===curP) b.className='active';
                b.onclick = () => { curP=i; load(); window.scrollTo(0,0); };
                w.appendChild(b);
            }
        }

        async function init() {
            const [rc, rp] = await Promise.all([
                fetch(S_URL+'categorias?select=nombre', {headers}).then(r=>r.json()),
                fetch(S_URL+'cursos?select=plataforma', {headers}).then(r=>r.json())
            ]);
            rc.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c=>{ const o=document.createElement('option'); o.value=o.innerText=c.nombre; document.getElementById('cat').appendChild(o); });
            [...new Set(rp.map(p=>p.plataforma))].sort().forEach(p=>{ const o=document.createElement('option'); o.value=o.innerText=p; document.getElementById('plat').appendChild(o); });
            load();
        }

        document.getElementById('q').oninput = () => { curP=1; clearTimeout(window.t); window.t=setTimeout(load, 500); };
        document.getElementById('cat').onchange = () => { curP=1; load(); };
        document.getElementById('plat').onchange = () => { curP=1; load(); };
        init();
    </script>
</body>
</html>
