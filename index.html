<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Clave Academy | Educación de Élite para el Futuro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #ff0000; --gold: #ffd700; --dark: #000; --bg: #050505; --surface: #0f0f0f; --border: rgba(255,255,255,0.08); --text-main: #fff; --text-dim: #999; --accent-blue: #0070f3; --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }
        header { min-height: 85vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 20px; background: radial-gradient(circle at 10% 10%, rgba(255,0,0,0.12) 0%, transparent 35%), radial-gradient(circle at 90% 90%, rgba(255,215,0,0.05) 0%, transparent 35%), var(--bg); border-bottom: 1px solid var(--border); position: relative; }
        .hero-label { font-family: 'Montserrat'; font-weight: 800; font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 25px; }
        .main-title { font-family: 'Montserrat'; font-size: clamp(2.8rem, 12vw, 6.5rem); font-weight: 900; line-height: 0.95; letter-spacing: -4px; margin-bottom: 30px; background: linear-gradient(180deg, #fff 0%, #aaa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-title span { color: var(--brand); -webkit-text-fill-color: var(--brand); }
        .hero-subtitle { max-width: 750px; font-size: 1.25rem; font-weight: 300; color: var(--text-dim); margin-bottom: 50px; }
        .trust-logos { display: flex; gap: 40px; align-items: center; opacity: 0.4; filter: grayscale(1) invert(1); margin-top: 40px; flex-wrap: wrap; justify-content: center; }
        .trust-logos img { height: 20px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 25px; }
        .search-wrap { position: relative; margin: -60px auto 100px; z-index: 100; width: 100%; max-width: 1100px; }
        .search-inner { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 100px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 50px 100px rgba(0,0,0,0.8); }
        @media (min-width: 768px) { .search-inner { flex-direction: row; padding: 12px 35px; } }
        .search-inner input, .search-inner select { background: transparent; border: none; color: #fff; padding: 15px; font-size: 1rem; outline: none; flex: 1; font-weight: 500; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; margin-bottom: 120px; }
        .p-card { background: var(--surface); border-radius: 32px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; height: 560px; text-decoration: none; color: inherit; transition: var(--transition); position: relative; }
        .p-card:hover { transform: translateY(-15px) scale(1.02); border-color: rgba(255,0,0,0.4); }
        .p-img-box { height: 230px; background: #000; overflow: hidden; position: relative; }
        .p-img-box img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); opacity: 0.85; }
        .p-logo-badge { position: absolute; bottom: -25px; right: 30px; width: 60px; height: 60px; background: #fff; border-radius: 18px; padding: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 30px rgba(0,0,0,0.4); z-index: 10; }
        .p-logo-badge img { width: 100%; height: 100%; object-fit: contain; }
        .p-body { padding: 45px 30px 30px; flex: 1; display: flex; flex-direction: column; }
        .p-plat { font-weight: 800; font-size: 0.75rem; text-transform: uppercase; color: var(--accent-blue); letter-spacing: 1.5px; margin-bottom: 15px; }
        .p-card h3 { font-family: 'Montserrat'; font-size: 1.4rem; font-weight: 800; line-height: 1.25; color: #fff; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .p-meta { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: var(--gold); font-weight: 700; margin-bottom: 20px; }
        .p-desc { color: #888; font-size: 0.95rem; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .p-pagi { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 150px; }
        .p-num { width: 55px; height: 55px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: #fff; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .p-num.active { background: var(--brand); border-color: var(--brand); box-shadow: 0 0 30px rgba(255,0,0,0.4); }
        footer { padding: 150px 20px; background: #000; border-top: 1px solid var(--border); text-align: center; }
        .f-logo { font-family: 'Montserrat'; font-size: 2.8rem; font-weight: 900; margin-bottom: 30px; letter-spacing: -2px; }
        .f-logo span { color: var(--brand); }
        #loading-elite { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; }
        .elite-spinner { width: 60px; height: 60px; border: 2px solid #222; border-top-color: var(--brand); border-radius: 50%; animation: rot 0.6s infinite linear; }
        @keyframes rot { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-elite"><div class="elite-spinner"></div></div>
    <header>
        <div class="hero-label">THE WORLD'S BEST FREE EDUCATION</div>
        <h1 class="main-title">LA CLAVE<br><span>ACADEMY</span></h1>
        <p class="hero-subtitle">La arquitectura definitiva para dominar nuevas habilidades. Explora más de <span id="t-span" style="color:#fff; font-weight:900">...</span> programas certificados.</p>
        <div class="trust-logos">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/IBM_logo.svg" alt="IBM">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/Escudo-UNAM-escalable.svg" alt="UNAM">
        </div>
    </header>
    <div class="container">
        <div class="search-wrap">
            <div class="search-inner">
                <input type="text" id="q" placeholder="¿Qué quieres dominar hoy?">
                <select id="plat"><option value="">Academias</option></select>
            </div>
        </div>
        <div id="grid" class="courses-grid"></div>
        <div id="pagi" class="p-pagi"></div>
    </div>
    <footer>
        <div class="f-logo">LA CLAVE<span> ACADEMY</span></div>
        <div class="f-credits">DEVELOPED BY <span>LA CLAVE ARGENTINA</span> • 2026</div>
    </footer>
    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        let page = 1; const limit = 16; let total = 0;
        const LOGOS = { 'google': 'https://www.gstatic.com/images/branding/product/2x/googleg_96dp.png', 'microsoft': 'https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg', 'ibm': 'https://upload.wikimedia.org/wikipedia/commons/5/51/IBM_logo.svg', 'meta': 'https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg', 'unam': 'https://upload.wikimedia.org/wikipedia/commons/c/ca/Escudo-UNAM-escalable.svg', 'youtube': 'https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg' };
        function getImg(c) {
            const yt = c.url.match(/(?:youtube\.com.*v=|youtu\.be\/)([^"&?\/\s]{11})/);
            if (yt) return `https://i.ytimg.com/vi/${yt[1]}/hqdefault.jpg`;
            return c.imagen_url || `https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&q=80`;
        }
        function getPlatLogo(p) {
            const low = p.toLowerCase();
            for(let k in LOGOS) { if(low.includes(k)) return LOGOS[k]; }
            return 'https://cdn-icons-png.flaticon.com/512/3429/3429141.png';
        }
        async function load() {
            const g = document.getElementById('grid'); const l = document.getElementById('loading-elite');
            const q = document.getElementById('q').value.trim(); const pl = document.getElementById('plat').value;
            l.style.display = 'flex';
            let u = `${S_URL}cursos?select=*,categorias!inner(nombre)&limit=${limit}&offset=${(page-1)*limit}`;
            if (q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if (pl) u += `&plataforma=eq.${encodeURIComponent(pl)}`;
            u += '&order=creado_el.desc';
            try {
                const res = await fetch(u, { headers: { ...headers, 'Prefer': 'count=exact' } });
                const cHead = res.headers.get('content-range'); if (cHead) { total = parseInt(cHead.split('/')[1]); document.getElementById('t-span').innerText = total.toLocaleString(); }
                const data = await res.json(); setTimeout(() => { l.style.display = 'none'; }, 600);
                g.innerHTML = '';
                data.forEach((c, i) => {
                    const card = document.createElement('a'); card.className = 'p-card'; card.href = c.url; card.target = '_blank';
                    card.innerHTML = `<div class="p-img-box"><div class="p-logo-badge"><img src="${getPlatLogo(c.plataforma)}"></div><img src="${getImg(c)}" loading="lazy"></div>
                        <div class="p-body"><div class="p-plat">${c.plataforma}</div><h3>${c.titulo}</h3><div class="p-meta"><span>★★★★★</span><span style="color:#666">|</span><span>OFICIAL</span></div><p class="p-desc">${c.descripcion || ''}</p></div>`;
                    g.appendChild(card);
                });
                renderPagi();
            } catch (e) { l.style.display = 'none'; }
        }
        function renderPagi() {
            const w = document.getElementById('pagi'); w.innerHTML = ''; const tP = Math.ceil(total / limit); if (tP <= 1) return;
            let s = Math.max(1, page - 1); let e = Math.min(tP, page + 1);
            if (page === 1) e = Math.min(tP, 3); if (page === tP) s = Math.max(1, tP - 2);
            for (let i = s; i <= e; i++) {
                const b = document.createElement('button'); b.className = `p-num ${i === page ? 'active' : ''}`; b.innerText = i;
                b.onclick = () => { page = i; load(); window.scrollTo({top: 600, behavior: 'smooth'}); }; w.appendChild(b);
            }
        }
        async function init() {
            load();
            try {
                const rp = await fetch(S_URL+'cursos?select=plataforma', {headers}).then(r=>r.json());
                const sp = document.getElementById('plat'); [...new Set(rp.map(p=>p.plataforma))].sort().forEach(p=>{ if(p) { const o=document.createElement('option'); o.value=o.innerText=p; sp.appendChild(o); } });
            } catch(e) {}
        }
        document.getElementById('q').oninput = () => { page=1; clearTimeout(window.t); window.t=setTimeout(load, 800); };
        document.getElementById('plat').onchange = () => { page=1; load(); };
        init();
    </script>
</body>
</html>
