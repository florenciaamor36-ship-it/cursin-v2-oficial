<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Clave Academy | Educación de Élite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #ff0000;
            --gold: #ffd700;
            --dark: #0a0a0a;
            --surface: #121212;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #2563eb;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark); 
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header { 
            background: linear-gradient(180deg, #1a1a1a 0%, var(--dark) 100%);
            padding: 80px 20px 100px; 
            text-align: center; 
            border-bottom: 4px solid var(--brand);
            position: relative;
        }
        .stats-badge {
            display: inline-block;
            background: var(--brand);
            color: var(--white);
            padding: 10px 25px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 0.85rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 5px 20px rgba(255,0,0,0.4);
        }
        .logo { 
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem; 
            font-weight: 900; 
            letter-spacing: -3px; 
            margin: 0;
            line-height: 0.9;
        }
        .logo span { color: var(--brand); }
        .tagline { 
            font-size: 1.3rem; 
            color: var(--gold); 
            margin-top: 15px; 
            font-weight: 600;
            letter-spacing: 1.5px;
            font-family: 'Montserrat', sans-serif;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 30px; }
        
        .search-engine {
            max-width: 1100px;
            margin: -50px auto 60px;
            background: var(--white);
            padding: 35px;
            border-radius: 30px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            position: relative;
            z-index: 1000;
        }
        @media (max-width: 900px) { .search-engine { grid-template-columns: 1fr; } }

        .search-engine input, .search-engine select {
            width: 100%;
            padding: 20px 25px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            font-size: 1.05rem;
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .search-engine input:focus { border-color: var(--brand); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 35px; 
            margin-bottom: 80px;
        }
        .course-card { 
            background: var(--surface); 
            border-radius: 25px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            height: 520px;
            position: relative;
        }
        .course-card:hover { 
            transform: translateY(-15px); 
            border-color: var(--brand);
            box-shadow: 0 20px 45px rgba(255,0,0,0.2);
        }
        .card-image { height: 240px; background: #000; position: relative; overflow: hidden; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }
        
        .premium-badge {
            position: absolute; top: 20px; left: 20px; background: var(--brand); color: var(--white);
            padding: 8px 16px; border-radius: 10px; font-weight: 900; font-size: 0.75rem; z-index: 10;
        }

        .card-content { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; }
        .academy-label { color: var(--accent); font-weight: 800; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 15px; }
        .course-card h3 { margin: 0 0 15px 0; font-size: 1.4rem; line-height: 1.3; font-family: 'Montserrat', sans-serif; color: var(--white); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .course-card p { color: var(--text-dim); font-size: 1rem; line-height: 1.6; margin: 0; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

        .pagi-elite { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 0 auto 100px; }
        .pagi-arrow { padding: 18px 30px; border: 2px solid #333; background: var(--surface); color: var(--white); border-radius: 18px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .pagi-arrow:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .pagi-numbers { display: flex; gap: 10px; }
        .num-circle { width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border: 2px solid #333; background: var(--surface); color: var(--white); border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .num-circle.active { background: var(--brand); border-color: var(--brand); box-shadow: 0 8px 25px rgba(255,0,0,0.4); }

        footer { background: #000000; padding: 100px 20px; text-align: center; border-top: 2px solid #1a1a1a; }
        .footer-logo { font-family: 'Montserrat', sans-serif; font-size: 2.5rem; font-weight: 900; margin-bottom: 30px; }
        .footer-logo span { color: var(--brand); }
        .credits { margin-top: 50px; font-weight: 800; font-size: 1.1rem; }
        .credits span { color: var(--brand); }

        #main-loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 60px; height: 60px; border: 5px solid #333; border-top-color: var(--brand); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-family: 'Montserrat', sans-serif; font-weight: 900; color: var(--gold); font-size: 1.5rem; }
    </style>
</head>
<body>
    <div id="main-loader"><div class="spinner"></div><div class="loader-text">SINCRONIZANDO...</div></div>
    <header>
        <div class="stats-badge">⚡ <span id="total-count">...</span> CURSOS DE ÉLITE</div>
        <h1 class="logo">LA CLAVE<span> ACADEMY</span></h1>
        <p class="tagline">La Clave Argentina: Tu Pasaporte al Conocimiento</p>
    </header>
    <div class="container">
        <div class="search-engine">
            <input type="text" id="query-in" placeholder="¿Qué buscás hoy? Ej: Python, UBA, Excel...">
            <select id="cat-filter"><option value="">Categorías</option></select>
            <select id="plat-filter"><option value="">Academias</option></select>
        </div>
        <div id="grid" class="grid"></div>
        <div id="pagination-box" class="pagi-elite"></div>
    </div>
    <footer>
        <div class="footer-logo">LA CLAVE<span> ACADEMY</span></div>
        <div class="credits">Diseñado y Creado por <span>LA CLAVE ARGENTINA</span> & <span>TIENDA SSH</span></div>
    </footer>
    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        let page = 1; const limit = 32; let total = 0;
        const hqFalls = ['https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1000&q=80'];

        function resolveImage(c, i) {
            const yt = c.url.match(/(?:youtube\.com.*v=|youtu\.be\/)([^"&?\/\s]{11})/);
            if (yt) return `https://i.ytimg.com/vi/${yt[1]}/hqdefault.jpg`;
            if (c.imagen_url && c.imagen_url.includes('http') && !c.imagen_url.toLowerCase().includes('logo')) return c.imagen_url;
            return hqFalls[i % hqFalls.length];
        }

        async function syncData() {
            const grid = document.getElementById('grid');
            const loader = document.getElementById('main-loader');
            const q = document.getElementById('query-in').value.trim();
            const ct = document.getElementById('cat-filter').value;
            const pl = document.getElementById('plat-filter').value;
            loader.style.display = 'flex'; grid.innerHTML = '';

            let u = `${S_URL}cursos?select=*,categorias(nombre)&limit=${limit}&offset=${(page - 1) * limit}`;
            if (q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if (ct) u += `&categorias.nombre=eq.${encodeURIComponent(ct)}`;
            if (pl) u += `&plataforma=eq.${encodeURIComponent(pl)}`;
            u += '&order=creado_el.desc';

            try {
                const response = await fetch(u, { headers });
                const data = await response.json();
                loader.style.display = 'none';
                data.forEach((c, i) => {
                    const card = document.createElement('div'); card.className = 'course-card'; card.onclick = () => window.open(c.url, '_blank');
                    card.innerHTML = `<div class="card-image"><div class="premium-badge">OFICIAL</div><img src="${resolveImage(c, i)}" onerror="this.src='${hqFalls[0]}'"></div>
                        <div class="card-content"><div class="academy-label">${c.plataforma}</div><h3>${c.titulo}</h3><p>${c.descripcion || 'Accede ahora.'}</p></div>`;
                    grid.appendChild(card);
                });
                getStats(q, ct, pl);
            } catch (e) { console.error(e); loader.style.display = 'none'; }
        }

        async function getStats(q, ct, pl) {
            let u = `${S_URL}cursos?select=count`;
            if (q) u += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if (ct) u += `&categorias.nombre=eq.${encodeURIComponent(ct)}`;
            if (pl) u += `&plataforma=eq.${encodeURIComponent(pl)}`;
            const r = await fetch(u, { headers }); const d = await r.json(); total = d[0].count;
            document.getElementById('total-count').innerText = total.toLocaleString();
            buildPagi();
        }

        function buildPagi() {
            const box = document.getElementById('pagination-box'); box.innerHTML = '';
            const tP = Math.ceil(total / limit); if (tP <= 1) return;
            const prev = document.createElement('button'); prev.className = 'pagi-arrow'; prev.innerHTML = '← Anterior'; prev.disabled = page === 1;
            prev.onclick = () => { page--; syncData(); window.scrollTo({top: 500, behavior: 'smooth'}); };
            box.appendChild(prev);
            const nums = document.createElement('div'); nums.className = 'pagi-numbers';
            for (let i = Math.max(1, page - 2); i <= Math.min(tP, page + 2); i++) {
                const b = document.createElement('button'); b.className = `num-circle ${i === page ? 'active' : ''}`; b.innerText = i;
                b.onclick = () => { page = i; syncData(); window.scrollTo({top: 500, behavior: 'smooth'}); };
                nums.appendChild(b);
            }
            box.appendChild(nums);
            const next = document.createElement('button'); next.className = 'pagi-arrow'; next.innerHTML = 'Siguiente →'; next.disabled = page === tP;
            next.onclick = () => { page++; syncData(); window.scrollTo({top: 500, behavior: 'smooth'}); };
            box.appendChild(next);
        }

        async function masterInit() {
            const [rc, rp] = await Promise.all([
                fetch(S_URL + 'categorias?select=nombre', { headers }).then(r => r.json()),
                fetch(S_URL + 'cursos?select=plataforma', { headers }).then(r => r.json())
            ]);
            rc.forEach(c => { const o = document.createElement('option'); o.value = o.innerText = c.nombre; document.getElementById('cat-filter').appendChild(o); });
            [...new Set(rp.map(p => p.plataforma))].forEach(p => { if (p) { const o = document.createElement('option'); o.value = o.innerText = p; document.getElementById('plat-filter').appendChild(o); } });
            syncData();
        }

        document.getElementById('query-in').oninput = () => { page = 1; clearTimeout(window.t); window.t = setTimeout(syncData, 700); };
        document.getElementById('cat-filter').onchange = () => { page = 1; syncData(); };
        document.getElementById('plat-filter').onchange = () => { page = 1; syncData(); };
        masterInit();
    </script>
</body>
</html>
