<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Clave Academy | Educación de Élite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #ff0000;
            --gold: #ffd700;
            --dark: #0a0a0a;
            --surface: #121212;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #2563eb;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark); 
            color: var(--text-main);
            overflow-x: hidden;
        }

        header { 
            background: linear-gradient(180deg, #1a1a1a 0%, var(--dark) 100%);
            padding: 60px 20px 80px; 
            text-align: center; 
            border-bottom: 4px solid var(--brand);
            position: relative;
        }
        .stats-top {
            display: inline-block;
            background: var(--brand);
            color: white;
            padding: 8px 24px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255,0,0,0.3);
        }
        .logo { 
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem; 
            font-weight: 900; 
            letter-spacing: -2px; 
            margin: 0;
            line-height: 1;
        }
        .logo span { color: var(--brand); }
        .tagline { 
            font-size: 1.2rem; 
            color: var(--gold); 
            margin-top: 10px; 
            font-weight: 500;
            letter-spacing: 1px;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        .search-section {
            max-width: 1100px;
            margin: -40px auto 50px;
            background: #ffffff;
            padding: 30px;
            border-radius: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 100;
        }
        .search-section input, .search-section select {
            flex: 1;
            min-width: 250px;
            padding: 18px 24px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-section input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px rgba(255,0,0,0.1); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; 
            margin-bottom: 60px;
        }
        .card { 
            background: var(--surface); 
            border-radius: 20px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            height: 480px;
            position: relative;
        }
        .card:hover { 
            transform: translateY(-12px); 
            border-color: var(--brand);
            box-shadow: 0 15px 40px rgba(255,0,0,0.15);
        }
        .card-img { 
            height: 220px; 
            background: #000; 
            position: relative;
            overflow: hidden;
        }
        .card-img img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--brand);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.7rem;
            z-index: 10;
            text-transform: uppercase;
        }
        .card-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .plat-name { 
            color: var(--accent); 
            font-weight: 800; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .card h3 { 
            margin: 0 0 15px 0; 
            font-size: 1.25rem; 
            line-height: 1.3; 
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card p { 
            color: var(--text-dim); 
            font-size: 0.95rem; 
            line-height: 1.6; 
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .pagi-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            margin: 60px 0 100px;
        }
        .pagi-btn { 
            padding: 15px 25px; 
            border: 2px solid #333; 
            background: var(--surface); 
            color: white; 
            border-radius: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .pagi-btn:hover:not(:disabled) { 
            border-color: var(--brand); 
            color: var(--brand);
        }
        .pagi-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .pagi-numbers { display: flex; gap: 8px; }
        .num-btn {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #333;
            background: var(--surface);
            color: white;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .num-btn.active {
            background: var(--brand);
            border-color: var(--brand);
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }

        footer { 
            background: #000; 
            padding: 80px 20px; 
            text-align: center; 
            border-top: 1px solid #222;
        }
        .footer-logo { font-family: 'Montserrat', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 20px; }
        .footer-logo span { color: var(--brand); }
        .credits { margin-top: 30px; font-weight: 700; }
        .credits span { color: var(--brand); }

        #loading-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; 
            display: none; align-items: center; justify-content: center; font-size: 2rem; color: var(--gold);
            font-family: 'Montserrat', sans-serif; font-weight: 900;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">CARGANDO...</div>

    <header>
        <div class="stats-top">⚡ ACCESO TOTAL A <span id="total-count">...</span> CURSOS</div>
        <h1 class="logo">LA CLAVE<span> ACADEMY</span></h1>
        <p class="tagline">La Clave Argentina: Tu Pasaporte al Conocimiento</p>
    </header>

    <div class="container">
        <div class="search-section">
            <input type="text" id="main-search" placeholder="¿Qué buscás hoy? (Ej: Python, UBA, Excel...)">
            <select id="cat-filter"><option value="">Todas las Categorías</option></select>
            <select id="plat-filter"><option value="">Todas las Academias</option></select>
        </div>

        <div id="grid" class="grid"></div>
        <div id="pagination" class="pagi-container"></div>
    </div>

    <footer>
        <div class="footer-logo">LA CLAVE<span> ACADEMY</span></div>
        <div style="max-width:800px; margin:0 auto; color:var(--text-dim); font-size:0.9rem; line-height:1.6;">
            © 2026 LA CLAVE ARGENTINA. Todos los derechos reservados. <br>
            Buscador automatizado de cursos gratuitos de alta calidad.
        </div>
        <div class="credits">Creado por <span>LA CLAVE ARGENTINA</span> & <span>TIENDA SSH</span></div>
    </footer>

    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        
        let currentPage = 1;
        const limit = 32;
        let totalCursos = 0;

        function getHighResImg(c, i) {
            const yt = c.url.match(/(?:youtube\.com.*v=|youtu\.be\/)([^"&?\/\s]{11})/);
            if (yt) return `https://i.ytimg.com/vi/${yt[1]}/hqdefault.jpg`;
            if (c.imagen_url && c.imagen_url.includes('http') && !c.imagen_url.toLowerCase().includes('logo')) return c.imagen_url;
            return `https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&q=80`;
        }

        async function doSearch() {
            const grid = document.getElementById('grid');
            const overlay = document.getElementById('loading-overlay');
            const q = document.getElementById('main-search').value.trim();
            const ct = document.getElementById('cat-filter').value;
            const pl = document.getElementById('plat-filter').value;

            overlay.style.display = 'flex';
            grid.innerHTML = '';

            let query = `${S_URL}cursos?select=*,categorias(nombre)&limit=${limit}&offset=${(currentPage - 1) * limit}`;
            if (q) query += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if (ct) query += `&categorias.nombre=eq.${encodeURIComponent(ct)}`;
            if (pl) query += `&plataforma=eq.${encodeURIComponent(pl)}`;
            query += '&order=creado_el.desc';

            try {
                const response = await fetch(query, { headers });
                const data = await response.json();
                overlay.style.display = 'none';

                data.forEach((c, i) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => window.open(c.url, '_blank');
                    card.innerHTML = `
                        <div class="card-img">
                            <div class="badge">GRATIS</div>
                            <img src="${getHighResImg(c, i)}" onerror="this.src='https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800&q=80'">
                        </div>
                        <div class="card-body">
                            <div class="plat-name">${c.plataforma}</div>
                            <h3>${c.titulo}</h3>
                            <p>${c.descripcion || 'Accedé a este programa oficial gratuito.'}</p>
                        </div>`;
                    grid.appendChild(card);
                });
                
                updateTotal(q, ct, pl);
            } catch (e) { console.error(e); overlay.style.display = 'none'; }
        }

        async function updateTotal(q, ct, pl) {
            let query = `${S_URL}cursos?select=count`;
            if (q) query += `&or=(titulo.ilike.*${encodeURIComponent(q)}*,descripcion.ilike.*${encodeURIComponent(q)}*)`;
            if (ct) query += `&categorias.nombre=eq.${encodeURIComponent(ct)}`;
            if (pl) query += `&plataforma=eq.${encodeURIComponent(pl)}`;
            
            const r = await fetch(query, { headers });
            const d = await r.json();
            totalCursos = d[0].count;
            document.getElementById('total-count').innerText = totalCursos.toLocaleString();
            renderPagi();
        }

        function renderPagi() {
            const wrap = document.getElementById('pagination');
            wrap.innerHTML = '';
            const totalPages = Math.ceil(totalCursos / limit);
            if (totalPages <= 1) return;

            const prev = document.createElement('button');
            prev.className = 'pagi-btn';
            prev.innerHTML = '← Anterior';
            prev.disabled = currentPage === 1;
            prev.onclick = () => { currentPage--; doSearch(); window.scrollTo({top: 400, behavior: 'smooth'}); };
            wrap.appendChild(prev);

            const nums = document.createElement('div');
            nums.className = 'pagi-numbers';
            let start = Math.max(1, currentPage - 2);
            let end = Math.min(totalPages, start + 4);
            if (end - start < 4) start = Math.max(1, end - 4);
            for (let i = Math.max(1, start); i <= end; i++) {
                const b = document.createElement('button');
                b.className = `num-btn ${i === currentPage ? 'active' : ''}`;
                b.innerText = i;
                b.onclick = () => { currentPage = i; doSearch(); window.scrollTo({top: 400, behavior: 'smooth'}); };
                nums.appendChild(b);
            }
            wrap.appendChild(nums);

            const next = document.createElement('button');
            next.className = 'pagi-btn';
            next.innerHTML = 'Siguiente →';
            next.disabled = currentPage === totalPages;
            next.onclick = () => { currentPage++; doSearch(); window.scrollTo({top: 400, behavior: 'smooth'}); };
            wrap.appendChild(next);
        }

        async function init() {
            const [rc, rp] = await Promise.all([
                fetch(S_URL + 'categorias?select=nombre', { headers }).then(r => r.json()),
                fetch(S_URL + 'cursos?select=plataforma', { headers }).then(r => r.json())
            ]);
            rc.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(c => {
                const o = document.createElement('option'); o.value = o.innerText = c.nombre; document.getElementById('cat-filter').appendChild(o);
            });
            [...new Set(rp.map(p => p.plataforma))].sort().forEach(p => {
                if (p) { const o = document.createElement('option'); o.value = o.innerText = p; document.getElementById('plat-filter').appendChild(o); }
            });
            doSearch();
        }

        document.getElementById('main-search').oninput = () => { currentPage = 1; clearTimeout(window.t); window.t = setTimeout(doSearch, 600); };
        document.getElementById('cat-filter').onchange = () => { currentPage = 1; doSearch(); };
        document.getElementById('plat-filter').onchange = () => { currentPage = 1; doSearch(); };
        init();
    </script>
</body>
</html>
