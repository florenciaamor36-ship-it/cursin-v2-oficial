<!DOCTYPE html>
<html lang='es' data-theme='dark'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>La Clave Academy | Tienda SSH</title>
    <link href='https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css' rel='stylesheet' />
    <script src='https://cdn.tailwindcss.com'></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .card-img { height: 130px; object-fit: contain; background: #080808; padding: 10px; }
    </style>
</head>
<body>
    <div class='drawer'>
        <input id='drawer' type='checkbox' class='drawer-toggle' />
        <div class='drawer-content flex flex-col'>
            <div class='navbar bg-zinc-950 border-b border-zinc-900 sticky top-0 z-50 px-4'>
                <div class='flex-none'><label for='drawer' class='btn btn-square btn-ghost'>☰</label></div>
                <div class='flex-1 font-black text-xl tracking-tighter'>LA CLAVE <span class='text-red-600'>ARGENTINA</span></div>
            </div>
            <main class='p-6 md:p-12 container mx-auto min-h-screen'>
                <div class='text-center mb-12'>
                    <h1 class='text-6xl font-black mb-2 uppercase'>TIENDA <span class='text-red-600'>SSH</span></h1>
                    <p class='text-zinc-500'>Plataforma de Élite | +65.000 Cursos</p>
                </div>
                <div class='max-w-xl mx-auto mb-12'>
                    <input type='text' id='q' placeholder='Buscar cursos...' class='input input-bordered w-full rounded-full bg-zinc-900' oninput='load()' />
                </div>
                <div id='g' class='grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6'></div>
            </main>
            <footer class='footer p-10 bg-zinc-950 border-t border-zinc-900'>
                <nav>
                    <header class='footer-title text-red-600'>La Clave Argentina</header>
                    <a class='link link-hover' onclick='alert("Quiénes Somos: La Clave Argentina es el ecosistema educativo más potente de la región.")'>Quiénes Somos</a>
                    <a class='link link-hover' onclick='alert("Legal: © 2026 La Clave Argentina. Plataforma operada por Tienda SSH.")'>Aviso Legal</a>
                    <a class='link link-hover' onclick='alert("Derechos: Propiedad intelectual de La Clave Argentina.")'>Derechos</a>
                </nav>
            </footer>
        </div>
        <div class='drawer-side'>
            <label for='drawer' class='drawer-overlay'></label>
            <ul class='menu p-6 w-80 min-h-full bg-black'>
                <li class='menu-title text-red-600'>MENÚ SSH</li>
                <li><a onclick='load()'>Todos los Cursos</a></li>
                <div class='divider opacity-10'></div>
                <li><a onclick='alert("FAQ: Acceso vía SSH configurado.")'>Preguntas Frecuentes</a></li>
            </ul>
        </div>
    </div>
    <script>
        const K = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const U = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/cursos?select=titulo,plataforma,url,imagen_url&limit=16';
        async function load() {
            const g = document.getElementById('g');
            const q = document.getElementById('q').value;
            let url = U;
            if(q) url += '&or=(titulo.ilike.*' + q + '*,descripcion.ilike.*' + q + '*)';
            try {
                const r = await fetch(url, { headers: { 'apikey': K, 'Authorization': 'Bearer ' + K } });
                const d = await r.json();
                g.innerHTML = '';
                d.forEach(x => {
                    const img = x.imagen_url || 'https://raw.githubusercontent.com/florenciaamor36-ship-it/cursin-v2-oficial/main/youtube_fallback.jpg';
                    g.innerHTML += '<div class="card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl"><img src="' + img + '" class="card-img" /><div class="card-body p-6"><div class="badge badge-error text-white font-bold text-[10px]">' + x.plataforma + '</div><h3 class="font-bold text-sm h-10 line-clamp-2">' + x.titulo + '</h3><a href="' + x.url + '" target="_blank" class="btn btn-sm btn-error mt-4 text-white font-bold">ACCEDER</a></div></div>';
                });
            } catch(e) {}
        }
        load();
    </script>
</body>
</html>
